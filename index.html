                          ? "트라우마"
                          : result.result === "injured"
                            ? "부상"
                            : "무사 생존";
                    const className =
                      result.result === "safe" ? "safe" : result.result;

                    return `
                      <div class="survival-row">
                        <span>${escapeHtml(result.name)} · 판정 ${result.roll}</span>
                        <strong class="chip ${className === "dead" ? "dead" : className}">${label}</strong>
                      </div>
                    `;
                  })
                  .join("")}
              </div>
            `
          : "";

        let resultHtml = "";

        if (dungeon.phase === "rolled") {
          resultHtml = `
            <div class="result-banner preview">
              임시 합계 ${total} · ${previewSuccess ? "현재 성공" : "현재 실패"}<br>
              밧줄을 사용하거나 현재 결과를 확정하세요.
            </div>
          `;
        } else if (dungeon.phase === "resolved") {
          resultHtml = `
            <div class="result-banner ${dungeon.lastSuccess ? "success" : "failure"}">
              ${
                dungeon.lastSuccess
                  ? `인카운터 성공 · 합계 ${total} · ${encounter.reward}G 확보`
                  : `인카운터 실패 · 합계 ${total} · 생존 판정 완료`
              }
            </div>
            ${survivalHtml}
          `;
        }

        const item = dungeon.carriedItem ? ITEM_DEFS[dungeon.carriedItem] : null;
        let itemButtonText = "아이템 없음";
        let itemButtonDisabled = true;
        let itemAction = "";

        if (item) {
          if (dungeon.itemUsed) {
            itemButtonText = `${item.icon} 사용 완료`;
          } else if (dungeon.carriedItem === "rope") {
            itemButtonText = `${item.icon} 밧줄 사용`;
            itemButtonDisabled = dungeon.phase !== "rolled";
            itemAction = "use-rope";
          } else if (dungeon.carriedItem === "bandage") {
            itemButtonText = `${item.icon} 붕대 사용`;
            itemButtonDisabled = dungeon.phase !== "ready";
            itemAction = "use-bandage-modal";
          } else if (dungeon.carriedItem === "lockpick") {
            itemButtonText = `${item.icon} 완료 시 자동 사용`;
            itemButtonDisabled = true;
          }
        }

        let mainButtonText = "파티 주사위 굴리기";
        let mainAction = "roll-encounter";

        if (dungeon.phase === "rolled") {
          mainButtonText = "현재 주사위 결과 확정";
          mainAction = "confirm-roll";
        } else if (dungeon.phase === "resolved") {
          mainButtonText = noSurvivors || isLast
            ? "던전 종료 · 결과 보기"
            : "다음 인카운터";
          mainAction = "advance-dungeon";
        }

        app.innerHTML = `
          <section class="screen screen-layout with-bottom">
            ${renderTopbar("모험", "adventure-back")}

            <main class="content">
              <div class="adventure-content">
                <div class="progress-row">${progressHtml}</div>

                <section class="panel">
                  <div class="section-head">
                    <div>
                      <h2>파티원 정보</h2>
                      <p>현재 생존 ${alivePartyMembers().length}명</p>
                    </div>
                  </div>
                  <div class="adventure-party">${partyHtml}</div>
                </section>

                <section class="encounter-card">
                  <small>${escapeHtml(difficulty.name)} · ENCOUNTER ${dungeon.index + 1}/3</small>
                  <h1>${escapeHtml(encounter.name)}</h1>
                  <p>파티 주사위 합계가 성공 범위 안에 들어가야 합니다.</p>

                  <div class="encounter-stats">
                    <div class="encounter-stat">
                      <span>성공 범위</span>
                      <strong>${encounter.min}~${encounter.max}</strong>
                    </div>
                    <div class="encounter-stat">
                      <span>성공 보상</span>
                      <strong>${encounter.reward}G</strong>
                    </div>
                    <div class="encounter-stat">
                      <span>누적 보상</span>
                      <strong>${dungeon.earnedGold}G</strong>
                    </div>
                  </div>
                </section>

                <section class="panel">
                  <div class="active-tool">
                    <span class="item-icon">${item ? item.icon : "✋"}</span>
                    <span>
                      <h3>${item ? escapeHtml(item.name) : "활성화된 도구 없음"}</h3>
                      <p>${item ? escapeHtml(item.description) : "이번 원정에는 도구를 등록하지 않았습니다."}</p>
                    </span>
                    <span class="chip">${item ? (dungeon.itemUsed ? "사용됨" : "미사용") : "없음"}</span>
                  </div>
                </section>

                <section class="panel">
                  <div class="section-head">
                    <div>
                      <h2>주사위 정보</h2>
                      <p>부상자는 D6에 무작위로 +2 또는 -2가 적용됩니다.</p>
                    </div>
                  </div>
                  <div class="dice-grid">${diceHtml}</div>
                  ${
                    dungeon.lastRolls.length
                      ? `
                          <div class="roll-total">
                            <span>파티 주사위 합계</span>
                            <strong>${total}</strong>
                          </div>
                        `
                      : ""
                  }
                  ${resultHtml}
                </section>
              </div>
            </main>

            <footer class="bottom-actions">
              <button class="btn primary" data-action="${mainAction}">${mainButtonText}</button>
              <button class="btn secondary" data-action="${itemAction}" ${itemButtonDisabled ? "disabled" : ""}>
                ${itemButtonText}
              </button>
            </footer>
          </section>
        `;
      }

      function renderResult() {
        const summary = state.lastSummary;

        if (!summary) {
          currentScreen = "hall";
          render();
          return;
        }

        const difficulty = DIFFICULTIES[summary.difficulty] || DIFFICULTIES.easy;
        const snapshots = Array.isArray(summary.memberSnapshots)
          ? summary.memberSnapshots
          : [];
        const deadIds = new Set(summary.deadIds || []);
        const injuredIds = new Set(summary.injuredIds || []);
        const newTraumaIds = new Set(summary.newTraumaIds || []);
        const reports = Array.isArray(summary.encounterReports)
          ? summary.encounterReports
          : [];

        const deadMembers = snapshots.filter(
          member => deadIds.has(member.id) || !member.alive
        );

        const deadHtml = deadMembers.length
          ? deadMembers
              .map(member => `
                <div class="result-member">
                  <span class="result-avatar">${member.icon || "🧭"}</span>
                  <span>
                    <h3>${escapeHtml(member.name)}</h3>
                    <p>${escapeHtml(member.race)} · ${escapeHtml(member.job)} · 모험 성공 ${member.successCount || 0}회</p>
                  </span>
                  <span class="chip dead">사망</span>
                </div>
              `)
              .join("")
          : `<div class="empty" style="min-height:90px">이번 원정의 사망자는 없습니다.</div>`;

        const memberHtml = snapshots.length
          ? snapshots
              .map(member => {
                const tags = [];

                if (deadIds.has(member.id) || !member.alive) {
                  tags.push('<span class="chip dead">사망</span>');
                } else {
                  tags.push('<span class="chip safe">생환</span>');
                }

                if (newTraumaIds.has(member.id)) {
                  tags.push('<span class="chip trauma">신규 트라우마</span>');
                } else if (member.trauma) {
                  tags.push('<span class="chip trauma">트라우마</span>');
                }

                if (injuredIds.has(member.id)) {
                  tags.push('<span class="chip injury">부상 후 회복</span>');
                }

                return `
                  <div class="result-member">
                    <span class="result-avatar">${member.icon || "🧭"}</span>
                    <span>
                      <h3>${escapeHtml(member.name)}</h3>
                      <p>${escapeHtml(member.gender)} · ${escapeHtml(member.race)} · ${escapeHtml(member.job)}</p>
                    </span>
                    <span class="chip-row" style="justify-content:flex-end">${tags.join("")}</span>
                  </div>
                `;
              })
              .join("")
          : `<div class="empty">파티 상세 기록이 없습니다.</div>`;

        const reportsHtml = reports.length
          ? reports
              .map((report, index) => `
                <div class="report-row">
                  <span class="report-index">${index + 1}</span>
                  <span>
                    <h3>${escapeHtml(report.name)}</h3>
                    <p>합계 ${report.total} · 범위 ${report.min}~${report.max}${report.success ? ` · ${report.reward}G` : " · 생존 판정"}</p>
                  </span>
                  <span class="report-result ${report.success ? "success" : "failure"}">
                    ${report.success ? "성공" : "실패"}
                  </span>
                </div>
              `)
              .join("")
          : `<div class="empty" style="min-height:90px">인카운터 상세 기록이 없습니다.</div>`;

        app.innerHTML = `
          <section class="screen screen-layout with-bottom">
            ${renderTopbar("모험 결과", "result-hall")}

            <main class="content">
              <section class="result-hero ${summary.partyWiped ? "failure" : "success"}">
                <div class="big-icon">${summary.partyWiped ? "☠️" : "🏆"}</div>
                <h1>${summary.partyWiped ? "모험 실패" : "모험 성공"}</h1>
                <p>${escapeHtml(difficulty.name)} 던전 · ${formatDateTime(summary.completedAt)}</p>

                <div class="result-summary-grid">
                  <div class="result-summary-cell">
                    <span>최종 획득</span>
                    <strong>${summary.finalGold || 0}G</strong>
                  </div>
                  <div class="result-summary-cell">
                    <span>생환</span>
                    <strong>${summary.survivors || 0}명</strong>
                  </div>
                  <div class="result-summary-cell">
                    <span>사망</span>
                    <strong>${deadMembers.length}명</strong>
                  </div>
                  <div class="result-summary-cell">
                    <span>누적 보상</span>
                    <strong>${summary.earnedGold || 0}G</strong>
                  </div>
                  <div class="result-summary-cell">
                    <span>락픽</span>
                    <strong>${summary.lockpickUsed ? "+50%" : "미사용"}</strong>
                  </div>
                  <div class="result-summary-cell">
                    <span>부상 배율</span>
                    <strong>${summary.partyWiped ? "0%" : `${Math.round((summary.multiplier || 0) * 100)}%`}</strong>
                  </div>
                </div>
              </section>

              <section class="panel">
                <div class="section-head">
                  <div>
                    <h2>사망한 모험가</h2>
                    <p>사망자는 명예의 전당에도 기록됩니다.</p>
                  </div>
                </div>
                <div class="result-list">${deadHtml}</div>
              </section>

              <section class="panel">
                <div class="section-head">
                  <div>
                    <h2>파티 결과 정보</h2>
                    <p>생환, 사망, 트라우마와 부상 기록입니다.</p>
                  </div>
                </div>
                <div class="result-list">${memberHtml}</div>
              </section>

              <section class="panel">
                <div class="section-head">
                  <div>
                    <h2>인카운터 결과</h2>
                    <p>각 인카운터의 성공 여부와 주사위 합계입니다.</p>
                  </div>
                </div>
                <div class="result-list">${reportsHtml}</div>
              </section>
            </main>

            <footer class="bottom-actions single">
              <button class="btn primary wide" data-action="result-hall">길드 메인 홀</button>
            </footer>
          </section>
        `;
      }

      function renderModal() {
        if (!modalState) {
          modalRoot.innerHTML = "";
          return;
        }

        if (modalState.type === "reset-confirm") {
          modalRoot.innerHTML = `
            <div class="modal-layer">
              <section class="modal">
                <div class="notice-box">
                  <span class="notice-icon">⚠️</span>
                  <h3>데이터 초기화</h3>
                  <p>
                    골드, 모험가, 아이템, 파티, 명예의 전당과 모든 기록을 삭제할까요?<br>
                    삭제한 데이터는 복구할 수 없습니다.
                  </p>
                </div>
                <div class="modal-actions">
                  <button class="btn secondary" data-action="close-modal">취소</button>
                  <button class="btn danger" data-action="confirm-reset">초기화</button>
                </div>
              </section>
            </div>
          `;
          return;
        }

        if (modalState.type === "notice") {
          modalRoot.innerHTML = `
            <div class="modal-layer">
              <section class="modal">
                <div class="notice-box">
                  <span class="notice-icon">${modalState.icon || "ℹ️"}</span>
                  <h3>${escapeHtml(modalState.title || "안내")}</h3>
                  <p>${escapeHtml(modalState.text || "")}</p>
                </div>
                <div class="modal-actions single">
                  <button class="btn primary wide" data-action="close-modal">확인</button>
                </div>
              </section>
            </div>
          `;
          return;
        }

        if (modalState.type === "recruit") {
          const character = state.characters.find(
            entry => entry.id === modalState.characterId
          );

          if (!character) {
            closeModal();
            return;
          }

          const profile = getCharacterProfile(character);
          modalRoot.innerHTML = `
            <div class="modal-layer">
              <section class="modal">
                <div class="modal-head">
                  <div>
                    <h2>신규 모험가 소집</h2>
                    <p>새로운 모험가가 길드에 합류했습니다.</p>
                  </div>
                </div>

                <div class="recruit-card">
                  <div class="recruit-avatar">${profile.job.icon}</div>
                  <h3>${escapeHtml(profile.name)}</h3>
                  <p>${escapeHtml(profile.gender.name)} · ${escapeHtml(profile.race.name)} · ${escapeHtml(profile.job.name)}</p>
                  <p>성격 · ${escapeHtml(profile.personality.name)}</p>
                  <div class="chip-row" style="justify-content:center;margin-top:10px">
                    ${renderStatusChips(character)}
                    <span class="chip">모험 성공 0회</span>
                  </div>
                </div>

                <div class="modal-actions single">
                  <button class="btn primary wide" data-action="close-modal">확인</button>
                </div>
              </section>
            </div>
          `;
          return;
        }

        if (modalState.type === "item-register") {
          const ownedItems = Object.entries(ITEM_DEFS).filter(
            ([key]) => (state.inventory[key] || 0) > 0
          );

          const rows = [
            `
              <button class="item-select-row ${!state.selectedItem ? "selected" : ""}" data-action="select-registered-item" data-key="none">
                <span class="item-icon">✋</span>
                <span>
                  <h3>아이템 없음</h3>
                  <p>이번 원정에 도구를 등록하지 않습니다.</p>
                </span>
                <span class="count">선택</span>
              </button>
            `,
            ...ownedItems.map(([key, item]) => `
              <button class="item-select-row ${state.selectedItem === key ? "selected" : ""}" data-action="select-registered-item" data-key="${key}">
                <span class="item-icon">${item.icon}</span>
                <span>
                  <h3>${escapeHtml(item.name)}</h3>
                  <p>${escapeHtml(item.description)}</p>
                </span>
                <span class="count">${state.inventory[key] || 0}개</span>
              </button>
            `)
          ].join("");

          modalRoot.innerHTML = `
            <div class="modal-layer">
              <section class="modal">
                <div class="modal-head">
                  <div>
                    <h2>아이템 등록</h2>
                    <p>활성화할 아이템은 한 개만 선택할 수 있습니다.</p>
                  </div>
                  <button class="modal-close" data-action="close-modal">✕</button>
                </div>

                <div class="item-select-list">${rows}</div>

                <div class="modal-actions single">
                  <button class="btn primary wide" data-action="close-modal">확인</button>
                </div>
              </section>
            </div>
          `;
          return;
        }

        if (modalState.type === "unimplemented") {
          modalRoot.innerHTML = `
            <div class="modal-layer">
              <section class="modal">
                <div class="modal-head">
                  <div>
                    <h2>${escapeHtml(modalState.name || "시설")}</h2>
                  </div>
                  <button class="modal-close" data-action="close-modal">✕</button>
                </div>
                <div class="notice-box">
                  <span class="notice-icon">🚧</span>
                  <h3>미구현</h3>
                  <p>이 시설은 추후 업데이트에서 이용할 수 있습니다.</p>
                </div>
                <div class="modal-actions single">
                  <button class="btn primary wide" data-action="close-modal">확인</button>
                </div>
              </section>
            </div>
          `;
          return;
        }

        if (modalState.type === "tool-shop") {
          const rows = Object.entries(ITEM_DEFS)
            .map(([key, item]) => `
              <div class="shop-row">
                <span class="item-icon">${item.icon}</span>
                <span>
                  <h3>${escapeHtml(item.name)}</h3>
                  <p>보유 ${state.inventory[key] || 0}개 · 가격 ${item.price}G</p>
                </span>
                <span class="shop-row-actions">
                  <button class="btn primary small" data-action="buy-item" data-key="${key}" ${state.gold < item.price ? "disabled" : ""}>구매</button>
                  <button class="btn secondary small" data-action="sell-item" data-key="${key}" ${(state.inventory[key] || 0) <= 0 ? "disabled" : ""}>판매</button>
                </span>
              </div>
            `)
            .join("");

          modalRoot.innerHTML = `
            <div class="modal-layer">
              <section class="modal">
                <div class="modal-head">
                  <div>
                    <h2>도구점</h2>
                    <p>구매 가격과 판매 가격은 동일합니다. 현재 골드 ${state.gold}G</p>
                  </div>
                  <button class="modal-close" data-action="close-modal">✕</button>
                </div>
                <div class="shop-list">${rows}</div>
                <div class="modal-actions single">
                  <button class="btn primary wide" data-action="close-modal">확인</button>
                </div>
              </section>
            </div>
          `;
          return;
        }

        if (modalState.type === "dungeon") {
          const key = modalState.key;
          const difficulty = DIFFICULTIES[key];
          const party = alivePartyMembers();
          const canStart = party.length === 4;

          modalRoot.innerHTML = `
            <div class="modal-layer">
              <section class="modal">
                <div class="modal-head">
                  <div>
                    <h2>${escapeHtml(difficulty.name)}</h2>
                    <p>${escapeHtml(difficulty.description)}</p>
                  </div>
                  <button class="modal-close" data-action="close-modal">✕</button>
                </div>

                <div class="detail-grid">
                  <div class="detail-cell">
                    <span>성공 범위 크기</span>
                    <strong>${difficulty.rangeSize}칸</strong>
                  </div>
                  <div class="detail-cell">
                    <span>보상 배율</span>
                    <strong>${Math.round(difficulty.rewardMultiplier * 100)}%</strong>
                  </div>
                  <div class="detail-cell">
                    <span>파티 편성</span>
                    <strong>${party.length}/4명</strong>
                  </div>
                </div>

                ${
                  canStart
                    ? ""
                    : `<div class="result-banner failure">출발하려면 파티원 4명이 필요합니다.</div>`
                }

                <div class="modal-actions">
                  <button class="btn secondary" data-action="close-modal">취소</button>
                  <button class="btn primary" data-action="start-dungeon" data-key="${key}" ${canStart ? "" : "disabled"}>모험 출발</button>
                </div>
              </section>
            </div>
          `;
          return;
        }

        if (modalState.type === "bandage") {
          const injured = (modalState.injuredIds || [])
            .map(id => state.characters.find(character => character.id === id))
            .filter(Boolean);
          const rows = injured
            .map(character => {
              const profile = getCharacterProfile(character);
              return `
                <button class="item-select-row" data-action="use-bandage-target" data-id="${character.id}">
                  <span class="item-icon">${profile.job.icon}</span>
                  <span>
                    <h3>${escapeHtml(profile.name)}</h3>
                    <p>${escapeHtml(profile.race.name)} · ${escapeHtml(profile.job.name)} · 부상 상태</p>
                  </span>
                  <span class="count">치료</span>
                </button>
              `;
            })
            .join("");

          modalRoot.innerHTML = `
            <div class="modal-layer">
              <section class="modal">
                <div class="modal-head">
                  <div>
                    <h2>붕대 사용할 대상</h2>
                    <p>부상한 파티원 한 명을 선택하세요.</p>
                  </div>
                  <button class="modal-close" data-action="close-modal">✕</button>
                </div>
                <div class="item-select-list">${rows}</div>
              </section>
            </div>
          `;
        }
      }

      function render() {
        normalizeState();

        if (currentScreen === "hall") {
          renderHall();
        } else if (currentScreen === "memorial") {
          renderMemorial();
        } else if (currentScreen === "party") {
          renderParty();
        } else if (currentScreen === "shop") {
          renderShop();
        } else if (currentScreen === "map") {
          renderMap();
        } else if (currentScreen === "adventure") {
          renderAdventure();
        } else if (currentScreen === "result") {
          renderResult();
        } else {
          renderTitle();
        }

        renderModal();
      }

      document.addEventListener("click", event => {
        const target = event.target.closest("[data-action]");

        if (!target) {
          return;
        }

        const action = target.dataset.action;

        if (action === "start-game") {
          goTo("hall");
        } else if (action === "open-reset") {
          showModal("reset-confirm");
        } else if (action === "confirm-reset") {
          resetGameData();
        } else if (action === "back-title") {
          goTo("title");
        } else if (action === "back-hall") {
          goTo("hall");
        } else if (action === "go-memorial") {
          goTo("memorial");
        } else if (action === "go-party") {
          goTo("party");
        } else if (action === "go-shop") {
          goTo("shop");
        } else if (action === "go-map") {
          goTo("map");
        } else if (action === "toggle-memorial") {
          const entry = document.querySelector(
            `[data-memorial-id="${CSS.escape(target.dataset.id)}"]`
          );
          entry?.classList.toggle("open");
        } else if (action === "toggle-party") {
          toggleParty(target.dataset.id);
        } else if (action === "recruit") {
          recruitCharacter();
        } else if (action === "open-item-register") {
          showModal("item-register");
        } else if (action === "select-registered-item") {
          selectRegisteredItem(target.dataset.key);
        } else if (action === "open-unimplemented") {
          showModal("unimplemented", { name: target.dataset.name });
        } else if (action === "open-tool-shop") {
          showModal("tool-shop");
        } else if (action === "buy-item") {
          buyItem(target.dataset.key);
        } else if (action === "sell-item") {
          sellItem(target.dataset.key);
        } else if (action === "open-dungeon") {
          selectedDungeonKey = target.dataset.key;
          showModal("dungeon", { key: selectedDungeonKey });
        } else if (action === "start-dungeon") {
          startDungeonAuto(target.dataset.key);
        } else if (action === "adventure-back") {
          showModal("notice", {
            title: "이동할 수 없습니다",
            text: "지금은 물러설 수 없습니다.",
            icon: "🛡️"
          });
        } else if (action === "roll-encounter") {
          rollEncounter();
        } else if (action === "confirm-roll") {
          confirmRolledResult();
        } else if (action === "advance-dungeon") {
          advanceDungeon();
        } else if (action === "use-rope") {
          useRope();
        } else if (action === "use-bandage-modal") {
          showBandageTargets();
        } else if (action === "use-bandage-target") {
          useBandage(target.dataset.id);
        } else if (action === "result-hall") {
          goTo("hall");
        } else if (action === "close-modal") {
          closeModal();
        }
      });

      window.addEventListener("keydown", event => {
        if (event.key === "Escape" && modalState) {
          closeModal();
        }
      });

      if (state.dungeon) {
        currentScreen = "adventure";
      }

      save();
      render();
    })();
  </script>
</body>
</html>
