<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#120d18">
  <title>길드 마스터 시뮬레이터</title>

  <style>
    :root {
      --bg: #100b16;
      --bg-soft: #1a1223;
      --panel: rgba(35, 25, 47, 0.97);
      --panel-soft: rgba(48, 34, 63, 0.88);
      --line: rgba(255, 255, 255, 0.11);
      --line-strong: rgba(226, 185, 96, 0.45);
      --text: #f6f0fa;
      --muted: #b9abc5;
      --accent: #e2b960;
      --accent-dark: #9f6b25;
      --safe: #8fdda7;
      --danger: #ef7f83;
      --injury: #f2b46f;
      --trauma: #c593ed;
      --blue: #8eb8ff;
      --shadow: 0 18px 46px rgba(0, 0, 0, 0.38);
      --radius: 18px;
      --topbar: 58px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      overflow-x: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 0%, rgba(122, 76, 160, 0.25), transparent 34%),
        radial-gradient(circle at 90% 100%, rgba(190, 131, 45, 0.14), transparent 34%),
        var(--bg);
      font-family:
        Pretendard,
        "Noto Sans KR",
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;
    }

    body {
      overflow: hidden;
      overscroll-behavior: none;
    }

    button {
      border: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.38;
      filter: grayscale(0.25);
    }

    strong {
      font-weight: 900;
    }

    .app-frame {
      width: 100%;
      max-width: 540px;
      height: 100dvh;
      min-height: 0;
      margin: 0 auto;
      overflow: hidden;
      border-inline: 1px solid rgba(255, 255, 255, 0.04);
      background:
        linear-gradient(rgba(16, 11, 22, 0.72), rgba(16, 11, 22, 0.95)),
        var(--bg);
      box-shadow: 0 0 80px rgba(0, 0, 0, 0.46);
    }

    .screen {
      height: 100%;
      min-height: 0;
    }

    .screen-layout {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-rows: var(--topbar) minmax(0, 1fr);
    }

    .screen-layout.with-bottom {
      grid-template-rows: var(--topbar) minmax(0, 1fr) auto;
    }

    .topbar {
      position: relative;
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      min-width: 0;
      height: var(--topbar);
      padding:
        max(7px, env(safe-area-inset-top))
        13px
        7px;
      border-bottom: 1px solid var(--line);
      background: rgba(17, 11, 23, 0.94);
      backdrop-filter: blur(14px);
    }

    .gold-box {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .gold-icon {
      display: grid;
      place-items: center;
      width: 34px;
      height: 34px;
      flex: 0 0 auto;
      border-radius: 11px;
      color: #2b1a06;
      background: linear-gradient(135deg, #f5d780, #bf812c);
      box-shadow: inset 0 1px rgba(255, 255, 255, 0.5);
    }

    .gold-copy span {
      display: block;
      color: var(--muted);
      font-size: 0.65rem;
    }

    .gold-copy strong {
      display: block;
      overflow: hidden;
      margin-top: 1px;
      color: #f3d17c;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 0.86rem;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 7px;
      min-width: 0;
    }

    .back-btn,
    .reset-data-btn {
      min-height: 36px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 11px;
      font-size: 0.73rem;
      font-weight: 850;
      white-space: nowrap;
    }

    .back-btn {
      color: #ddd2e6;
      background: rgba(255, 255, 255, 0.05);
    }

    .reset-data-btn {
      color: #ffb7b7;
      border-color: rgba(239, 127, 131, 0.32);
      background: rgba(151, 52, 61, 0.22);
    }

    .content {
      min-width: 0;
      min-height: 0;
      overflow-x: hidden;
      overflow-y: auto;
      padding: 14px;
      padding-bottom: calc(14px + env(safe-area-inset-bottom));
      overscroll-behavior-x: none;
      touch-action: pan-y;
    }

    .content.no-scroll {
      overflow-y: hidden;
    }

    .page-title {
      margin: 0;
      font-size: 1.16rem;
      letter-spacing: -0.04em;
    }

    .page-subtitle {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.55;
    }

    .section-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 11px;
    }

    .section-head h2,
    .section-head h3 {
      margin: 0;
      font-size: 0.94rem;
      letter-spacing: -0.025em;
    }

    .section-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.67rem;
      line-height: 1.5;
    }

    .panel {
      min-width: 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(155deg, rgba(44, 31, 57, 0.96), rgba(27, 19, 37, 0.97));
      box-shadow: var(--shadow);
    }

    .panel + .panel {
      margin-top: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      min-height: 43px;
      padding: 0 14px;
      border: 1px solid transparent;
      border-radius: 13px;
      font-size: 0.77rem;
      font-weight: 900;
    }

    .btn.primary {
      color: #271804;
      background: linear-gradient(135deg, #f2d17a, #be812e);
      box-shadow: 0 9px 20px rgba(226, 185, 96, 0.17);
    }

    .btn.secondary {
      border-color: var(--line);
      background: rgba(255, 255, 255, 0.055);
    }

    .btn.blue {
      color: #101827;
      background: linear-gradient(135deg, #c1d6ff, #78a7f6);
    }

    .btn.danger {
      color: #fff;
      border-color: rgba(239, 127, 131, 0.3);
      background: rgba(155, 60, 68, 0.6);
    }

    .btn.small {
      min-height: 34px;
      padding: 0 10px;
      border-radius: 10px;
      font-size: 0.68rem;
    }

    .btn.wide {
      width: 100%;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 120px;
      padding: 20px;
      border: 1px dashed rgba(255, 255, 255, 0.14);
      border-radius: 15px;
      color: var(--muted);
      text-align: center;
      font-size: 0.73rem;
      line-height: 1.6;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 0 7px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      color: #d7ccdf;
      background: rgba(255, 255, 255, 0.045);
      font-size: 0.61rem;
      font-weight: 850;
    }

    .chip.safe {
      color: #bdf0ca;
      border-color: rgba(143, 221, 167, 0.25);
      background: rgba(72, 139, 90, 0.17);
    }

    .chip.injury {
      color: #ffd19d;
      border-color: rgba(242, 180, 111, 0.25);
      background: rgba(156, 96, 39, 0.17);
    }

    .chip.trauma {
      color: #e0b7fb;
      border-color: rgba(197, 147, 237, 0.27);
      background: rgba(123, 69, 164, 0.18);
    }

    .chip.dead {
      color: #ffb5b4;
      border-color: rgba(239, 127, 131, 0.28);
      background: rgba(155, 60, 68, 0.18);
    }

    .bottom-actions {
      position: relative;
      z-index: 15;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
      padding:
        10px
        13px
        max(10px, env(safe-area-inset-bottom));
      border-top: 1px solid var(--line);
      background: rgba(17, 11, 23, 0.96);
      backdrop-filter: blur(14px);
    }

    .bottom-actions.single {
      grid-template-columns: 1fr;
    }

    .title-screen {
      height: 100%;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 24px 18px max(24px, env(safe-area-inset-bottom));
      background:
        linear-gradient(rgba(13, 8, 18, 0.47), rgba(13, 8, 18, 0.94)),
        radial-gradient(circle at 50% 18%, rgba(226, 185, 96, 0.2), transparent 30%),
        radial-gradient(circle at 15% 60%, rgba(123, 76, 163, 0.23), transparent 38%);
    }

    .title-card {
      width: 100%;
      max-width: 430px;
      text-align: center;
    }

    .title-emblem {
      display: grid;
      place-items: center;
      width: 104px;
      height: 104px;
      margin: 0 auto;
      border: 1px solid rgba(226, 185, 96, 0.35);
      border-radius: 31px;
      color: #291a07;
      background: linear-gradient(145deg, #f4d88d, #b87727);
      box-shadow:
        inset 0 2px rgba(255, 255, 255, 0.45),
        0 24px 60px rgba(0, 0, 0, 0.42);
      font-size: 3rem;
      transform: rotate(-2deg);
    }

    .title-card h1 {
      margin: 24px 0 8px;
      font-size: clamp(1.75rem, 8vw, 2.45rem);
      line-height: 1.12;
      letter-spacing: -0.06em;
    }

    .title-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.7;
    }

    .start-btn {
      width: min(100%, 310px);
      min-height: 56px;
      margin-top: 34px;
      border-radius: 17px;
      font-size: 0.93rem;
    }

    .title-version {
      margin-top: 14px;
      color: #786a84;
      font-size: 0.61rem;
    }

    .hall-content {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(230px, 1fr) auto;
      gap: 13px;
    }

    .hall-hero {
      position: relative;
      overflow: hidden;
      min-height: 180px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background:
        linear-gradient(145deg, rgba(53, 36, 69, 0.96), rgba(28, 19, 38, 0.97)),
        radial-gradient(circle at 82% 15%, rgba(226, 185, 96, 0.22), transparent 40%);
      box-shadow: var(--shadow);
    }

    .hall-hero::after {
      content: "🏰";
      position: absolute;
      right: -10px;
      bottom: -30px;
      opacity: 0.085;
      font-size: 9rem;
      pointer-events: none;
    }

    .hall-hero small {
      color: var(--accent);
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 0.1em;
    }

    .hall-hero h1 {
      margin: 9px 0 5px;
      font-size: 1.45rem;
      letter-spacing: -0.045em;
    }

    .hall-hero p {
      max-width: 320px;
      margin: 0;
      color: var(--muted);
      font-size: 0.71rem;
      line-height: 1.6;
    }

    .hall-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 17px;
    }

    .hall-stat {
      min-width: 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.04);
    }

    .hall-stat span {
      display: block;
      color: var(--muted);
      font-size: 0.6rem;
    }

    .hall-stat strong {
      display: block;
      overflow: hidden;
      margin-top: 4px;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 0.82rem;
    }

    .hall-art {
      min-height: 230px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 22px;
      background:
        radial-gradient(circle at 50% 35%, rgba(226, 185, 96, 0.14), transparent 28%),
        linear-gradient(160deg, rgba(34, 24, 45, 0.6), rgba(22, 15, 30, 0.72));
      box-shadow: inset 0 0 50px rgba(0, 0, 0, 0.18);
    }

    .hall-art div {
      text-align: center;
    }

    .hall-art span {
      display: block;
      font-size: 4.4rem;
      filter: drop-shadow(0 15px 18px rgba(0, 0, 0, 0.35));
    }

    .hall-art p {
      margin: 13px 0 0;
      color: #9f91ab;
      font-size: 0.67rem;
    }

    .hall-menu {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .hall-menu-btn {
      min-width: 0;
      min-height: 76px;
      display: grid;
      grid-template-columns: 39px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 17px;
      background: linear-gradient(145deg, rgba(48, 34, 62, 0.96), rgba(30, 21, 40, 0.96));
      text-align: left;
      box-shadow: 0 12px 25px rgba(0, 0, 0, 0.22);
    }

    .hall-menu-btn .icon {
      display: grid;
      place-items: center;
      width: 39px;
      height: 39px;
      border-radius: 13px;
      background: rgba(255, 255, 255, 0.07);
      font-size: 1.25rem;
    }

    .hall-menu-btn strong {
      display: block;
      font-size: 0.75rem;
    }

    .hall-menu-btn small {
      display: block;
      overflow: hidden;
      margin-top: 3px;
      color: var(--muted);
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 0.58rem;
    }

    .memorial-list {
      display: grid;
      gap: 9px;
      margin-top: 13px;
    }

    .memorial-entry {
      overflow: hidden;
      border: 1px solid rgba(239, 127, 131, 0.17);
      border-radius: 15px;
      background: rgba(88, 42, 51, 0.13);
    }

    .memorial-summary {
      width: 100%;
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 11px;
      background: transparent;
      text-align: left;
    }

    .memorial-summary .avatar,
    .adventurer-avatar,
    .party-avatar,
    .result-avatar {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      flex: 0 0 auto;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.07);
      font-size: 1.17rem;
    }

    .memorial-summary h3,
    .adventurer-card h3,
    .party-slot h3,
    .result-member h3 {
      overflow: hidden;
      margin: 0;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 0.75rem;
    }

    .memorial-summary p,
    .adventurer-card p,
    .party-slot p,
    .result-member p {
      overflow: hidden;
      margin: 3px 0 0;
      color: var(--muted);
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 0.61rem;
    }

    .expand-mark {
      color: #c9bbd3;
      font-size: 0.74rem;
      transition: transform 0.2s ease;
    }

    .memorial-entry.open .expand-mark {
      transform: rotate(180deg);
    }

    .memorial-detail {
      display: none;
      padding: 0 12px 12px;
    }

    .memorial-entry.open .memorial-detail {
      display: block;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
      padding-top: 10px;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
    }

    .detail-cell {
      min-width: 0;
      padding: 9px;
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.035);
    }

    .detail-cell span {
      display: block;
      color: var(--muted);
      font-size: 0.58rem;
    }

    .detail-cell strong {
      display: block;
      overflow: hidden;
      margin-top: 4px;
      white-space: nowrap;
      text-overflow: ellipsis;
      font-size: 0.69rem;
    }

    .party-content {
      min-height: calc(100dvh - var(--topbar));
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 11px;
    }

    .party-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 7px;
    }

    .party-slot {
      min-width: 0;
      min-height: 91px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.035);
      text-align: center;
    }

    .party-slot.filled {
      border-color: rgba(226, 185, 96, 0.35);
      background: rgba(226, 185, 96, 0.08);
    }

    .party-slot .party-avatar {
      width: 34px;
      height: 34px;
      margin: 0 auto 6px;
      border-radius: 10px;
      font-size: 1rem;
    }

    .party-slot h3 {
      font-size: 0.6rem;
    }

    .party-slot p {
      font-size: 0.52rem;
    }

    .party-slot.empty-slot {
      display: grid;
      place-items: center;
      color: #81738d;
      border-style: dashed;
      font-size: 0.57rem;
    }

    .adventurer-list-wrap {
      min-height: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .adventurer-list {
      min-height: 0;
      overflow-y: auto;
      display: grid;
      align-content: start;
      gap: 8px;
      padding-right: 2px;
      overscroll-behavior: contain;
    }

    .adventurer-card {
      min-width: 0;
      display: grid;
      grid-template-columns: 42px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.035);
      text-align: left;
    }

    .adventurer-card.selected {
      border-color: var(--line-strong);
      background: rgba(226, 185, 96, 0.1);
    }

    .adventurer-meta {
      min-width: 0;
    }

    .adventurer-meta .chip-row {
      margin-top: 6px;
    }

    .party-toggle-label {
      color: #dbc98d;
      font-size: 0.59rem;
      font-weight: 900;
      white-space: nowrap;
    }

    .city-map,
    .dungeon-map {
      position: relative;
      min-height: calc(100dvh - var(--topbar) - 28px);
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 23px;
      background:
        radial-gradient(circle at 20% 18%, rgba(226, 185, 96, 0.15), transparent 23%),
        radial-gradient(circle at 75% 65%, rgba(112, 80, 145, 0.2), transparent 32%),
        linear-gradient(155deg, rgba(45, 31, 57, 0.96), rgba(22, 15, 30, 0.98));
      box-shadow: var(--shadow);
    }

    .city-map::before,
    .dungeon-map::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.14;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.06) 1px, transparent 1px);
      background-size: 34px 34px;
      pointer-events: none;
    }

    .map-title {
      position: absolute;
      z-index: 2;
      top: 18px;
      left: 18px;
    }

    .map-title h1 {
      margin: 0;
      font-size: 1.22rem;
    }

    .map-title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.67rem;
    }

    .place-btn,
    .dungeon-btn {
      position: absolute;
      z-index: 3;
      display: grid;
      place-items: center;
      width: 114px;
      height: 114px;
      padding: 10px;
      border: 1px solid rgba(255, 255, 255, 0.13);
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 25%, rgba(255, 255, 255, 0.13), transparent 32%),
        linear-gradient(145deg, rgba(71, 49, 89, 0.97), rgba(34, 23, 45, 0.98));
      box-shadow:
        inset 0 2px rgba(255, 255, 255, 0.07),
        0 16px 32px rgba(0, 0, 0, 0.31);
      text-align: center;
    }

    .place-btn .place-icon,
    .dungeon-btn .place-icon {
      display: block;
      font-size: 2rem;
    }

    .place-btn strong,
    .dungeon-btn strong {
      display: block;
      margin-top: 5px;
      font-size: 0.7rem;
    }

    .place-btn small,
    .dungeon-btn small {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.52rem;
    }

    .place-blacksmith {
      top: 22%;
      left: 9%;
    }

    .place-toolshop {
      top: 19%;
      right: 8%;
    }

    .place-restaurant {
      bottom: 13%;
      left: 12%;
    }

    .place-clinic {
      right: 11%;
      bottom: 11%;
    }

    .map-party {
      position: relative;
      z-index: 4;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 16px;

<body>
  <div id="app" class="app-frame"></div>
  <div id="modalRoot"></div>

  <script src="./game-db.js"></script>

  <script>
    (() => {
      "use strict";

      const STORAGE_KEY = "dicebound-expedition-v1";
      const SAVE_VERSION = 7;
      const MAX_LIVING_ADVENTURERS = 10;

      const GAME_DB = globalThis.GAME_DB;
      const app = document.getElementById("app");
      const modalRoot = document.getElementById("modalRoot");

      const requiredLists = [
        "firstNames",
        "lastNames",
        "jobs",
        "races",
        "genders",
        "personalities",
        "encounterNames"
      ];

      const invalidDatabase =
        !GAME_DB ||
        requiredLists.some(
          key => !Array.isArray(GAME_DB[key]) || GAME_DB[key].length === 0
        ) ||
        !GAME_DB.items ||
        !GAME_DB.difficulties;

      if (invalidDatabase) {
        app.innerHTML = `
          <section class="title-screen">
            <div class="panel" style="max-width:430px;text-align:center">
              <h1 class="page-title">게임 데이터를 불러오지 못했습니다.</h1>
              <p class="page-subtitle">
                <strong>game-db.js</strong> 파일이 index.html과 같은 폴더에 있는지 확인해 주세요.
              </p>
            </div>
          </section>
        `;
        return;
      }

      const STARTING_GOLD = Number(GAME_DB.settings?.startingGold) || 300;
      const GACHA_COST = Number(GAME_DB.settings?.gachaCost) || 10;
      const ITEM_DEFS = GAME_DB.items;
      const DIFFICULTIES = GAME_DB.difficulties;
      const ENCOUNTER_NAMES = GAME_DB.encounterNames;

      let currentScreen = "title";
      let selectedDungeonKey = null;
      let modalState = null;

      function uid() {
        if (window.crypto && typeof window.crypto.randomUUID === "function") {
          return window.crypto.randomUUID();
        }

        return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
      }

      function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
      }

      function pick(list) {
        return list[randomInt(0, list.length - 1)];
      }

      function clamp(value, min, max) {
        return Math.max(min, Math.min(max, value));
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function formatDateTime(value) {
        if (!value) {
          return "기록 없음";
        }

        try {
          return new Intl.DateTimeFormat("ko-KR", {
            year: "numeric",
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
          }).format(new Date(value));
        } catch {
          return "기록 없음";
        }
      }

      function findDbEntry(list, id) {
        if (!id || !Array.isArray(list)) {
          return null;
        }

        return list.find(entry => entry.id === id) || null;
      }

      function getCharacterName(character) {
        if (character.legacyName) {
          return character.legacyName;
        }

        const firstName = findDbEntry(GAME_DB.firstNames, character.firstNameId);
        const lastName = findDbEntry(GAME_DB.lastNames, character.lastNameId);
        const combined = [firstName?.name, lastName?.name].filter(Boolean).join(" ");

        return combined || character.name || "이름 없는 모험가";
      }

      function getCharacterJob(character) {
        return findDbEntry(GAME_DB.jobs, character.jobId) || {
          id: null,
          name: character.legacyJobName || character.job || "무직",
          icon: character.legacyJobIcon || character.icon || "🧭",
          description: "이전 버전에서 모집된 모험가의 직업입니다."
        };
      }

      function getCharacterProfile(character) {
        return {
          name: getCharacterName(character),
          job: getCharacterJob(character),
          race: findDbEntry(GAME_DB.races, character.raceId) || {
            id: null,
            name: "미상",
            description: ""
          },
          gender: findDbEntry(GAME_DB.genders, character.genderId) || {
            id: null,
            name: "미상"
          },
          personality: findDbEntry(GAME_DB.personalities, character.personalityId) || {
            id: null,
            name: "성격 미상",
            description: ""
          }
        };
      }

      function characterSnapshot(character, injuredBeforeRecovery = character.injured) {
        const profile = getCharacterProfile(character);

        return {
          id: character.id,
          name: profile.name,
          icon: profile.job.icon,
          job: profile.job.name,
          race: profile.race.name,
          gender: profile.gender.name,
          personality: profile.personality.name,
          alive: character.alive,
          trauma: character.trauma,
          injured: Boolean(injuredBeforeRecovery),
          successCount: Number(character.successCount) || 0,
          deathRecord: character.deathRecord || null
        };
      }

      function defaultState() {
        return {
          saveVersion: SAVE_VERSION,
          gold: STARTING_GOLD,
          inventory: {
            rope: 0,
            bandage: 0,
            lockpick: 0
          },
          selectedItem: null,
          selectedDifficulty: "easy",
          characters: [],
          partyIds: [],
          dungeon: null,
          lastSummary: null,
          log: []
        };
      }

      function migrateCharacter(character) {
        const firstName = findDbEntry(GAME_DB.firstNames, character.firstNameId);
        const lastName = findDbEntry(GAME_DB.lastNames, character.lastNameId);
        const matchedJob =
          findDbEntry(GAME_DB.jobs, character.jobId) ||
          GAME_DB.jobs.find(job => job.name === character.job);
        const race = findDbEntry(GAME_DB.races, character.raceId);
        const gender = findDbEntry(GAME_DB.genders, character.genderId);
        const personality = findDbEntry(GAME_DB.personalities, character.personalityId);

        return {
          ...character,
          firstNameId: firstName?.id || null,
          lastNameId: lastName?.id || null,
          legacyName:
            character.legacyName ||
            (!(firstName && lastName) ? character.name || null : null),
          jobId: matchedJob?.id || null,
          legacyJobName:
            character.legacyJobName ||
            (!matchedJob ? character.job || null : null),
          legacyJobIcon:
            character.legacyJobIcon ||
            (!matchedJob ? character.icon || "🧭" : null),
          raceId: race?.id || pick(GAME_DB.races).id,
          genderId: gender?.id || pick(GAME_DB.genders).id,
          personalityId: personality?.id || pick(GAME_DB.personalities).id,
          alive: character.alive !== false,
          injured: Boolean(character.injured),
          trauma: Boolean(character.trauma),
          successCount: Number.isFinite(Number(character.successCount))
            ? Number(character.successCount)
            : 0,
          deathRecord: character.deathRecord || null
        };
      }

      function migrateDungeon(dungeon, selectedDifficulty) {
        if (!dungeon) {
          return null;
        }

        const difficultyKey = DIFFICULTIES[dungeon.difficulty]
          ? dungeon.difficulty
          : selectedDifficulty;
        const difficulty = DIFFICULTIES[difficultyKey] || DIFFICULTIES.easy;

        return {
          carriedItem: null,
          itemUsed: false,
          bandageTargetMode: false,
          ropeRerolled: false,
          traumaSkips: {},
          startingTraumaIds: [],
          encounterReports: [],
          difficulty: difficultyKey,
          ...dungeon,
          encounters: (dungeon.encounters || []).map(encounter => {
            if (
              Number.isFinite(Number(encounter.min)) &&
              Number.isFinite(Number(encounter.max))
            ) {
              return {
                ...encounter,
                min: Number(encounter.min),
                max: Number(encounter.max),
                baseReward: Number.isFinite(Number(encounter.baseReward))
                  ? Number(encounter.baseReward)
                  : Math.max(
                      1,
                      Math.round(
                        (Number(encounter.reward) || 1) /
                          difficulty.rewardMultiplier
                      )
                    ),
                reward: Number(encounter.reward) || 1
              };
            }

            const radius = Math.floor(difficulty.rangeSize / 2);
            const center = clamp(
              Number(encounter.target) || 14,
              4 + radius,
              24 - radius
            );
            const oldReward = Number(encounter.reward) || 40;

            return {
              id: encounter.id || uid(),
              name: encounter.name || pick(ENCOUNTER_NAMES),
              min: center - radius,
              max: center + radius,
              baseReward: Math.max(
                1,
                Math.round(oldReward / difficulty.rewardMultiplier)
              ),
              reward: oldReward
            };
          })
        };
      }

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);

          if (!raw) {
            return defaultState();
          }

          const parsed = JSON.parse(raw);
          const fresh = defaultState();
          const selectedDifficulty = DIFFICULTIES[parsed.selectedDifficulty]
            ? parsed.selectedDifficulty
            : "easy";

          const merged = {
            ...fresh,
            ...parsed,
            saveVersion: SAVE_VERSION,
            gold: Number.isFinite(Number(parsed.gold))
              ? Number(parsed.gold)
              : STARTING_GOLD,
            inventory: {
              ...fresh.inventory,
              ...(parsed.inventory || {})
            },
            selectedDifficulty,
            characters: Array.isArray(parsed.characters)
              ? parsed.characters.map(migrateCharacter)
              : [],
            partyIds: Array.isArray(parsed.partyIds)
              ? parsed.partyIds
              : [],
            log: Array.isArray(parsed.log) ? parsed.log : []
          };

          merged.dungeon = migrateDungeon(parsed.dungeon, selectedDifficulty);
          return merged;
        } catch (error) {
          console.warn("저장 데이터를 불러오지 못했습니다.", error);
          return defaultState();
        }
      }

      let state = loadState();

      function save() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function addLog(text) {
        state.log.unshift({
          id: uid(),
          time: new Date().toISOString(),
          text
        });
        state.log = state.log.slice(0, 100);
      }

      function resetGameData() {
        localStorage.removeItem(STORAGE_KEY);
        state = defaultState();
        currentScreen = "hall";
        selectedDungeonKey = null;
        modalState = null;
        save();
        render();
      }

      function normalizeState() {
        state.partyIds = state.partyIds
          .filter(id => {
            const character = state.characters.find(entry => entry.id === id);
            return Boolean(character && character.alive);
          })
          .slice(0, 4);

        if (
          state.selectedItem &&
          (state.inventory[state.selectedItem] || 0) <= 0 &&
          !state.dungeon
        ) {
          state.selectedItem = null;
        }

        if (state.dungeon) {
          currentScreen = "adventure";
        }
      }

      function livingCharacters() {
        return state.characters.filter(character => character.alive);
      }

      function deadCharacters() {
        return state.characters.filter(character => !character.alive);
      }

      function alivePartyMembers() {
        return state.partyIds
          .map(id => state.characters.find(character => character.id === id))
          .filter(character => character && character.alive);
      }

      function createCharacter() {
        return {
          id: uid(),
          firstNameId: pick(GAME_DB.firstNames).id,
          lastNameId: pick(GAME_DB.lastNames).id,
          jobId: pick(GAME_DB.jobs).id,
          raceId: pick(GAME_DB.races).id,
          genderId: pick(GAME_DB.genders).id,
          personalityId: pick(GAME_DB.personalities).id,
          alive: true,
          injured: false,
          trauma: false,
          successCount: 0,
          deathRecord: null
        };
      }

      function renderTopbar(
        title,
        backAction = "back-hall",
        showResetButton = false
      ) {
        return `
          <header class="topbar">
            <div class="gold-box">
              <div class="gold-icon">🪙</div>
              <div class="gold-copy">
                <span>${escapeHtml(title)}</span>
                <strong>${state.gold.toLocaleString("ko-KR")} G</strong>
              </div>
            </div>

            <div class="topbar-actions">
              ${
                showResetButton
                  ? '<button class="reset-data-btn" data-action="open-reset">데이터 초기화</button>'
                  : ""
              }
              <button class="back-btn" data-action="${backAction}">뒤로</button>
            </div>
          </header>
        `;
      }

      function renderStatusChips(character) {
        const chips = [];

        if (character.trauma) {
          chips.push('<span class="chip trauma">트라우마</span>');
        }

        if (character.injured) {
          chips.push('<span class="chip injury">부상 ±2</span>');
        }

        if (!chips.length) {
          chips.push('<span class="chip safe">정상</span>');
        }

        return chips.join("");
      }

      function goTo(screen) {
        if (state.dungeon) {
          currentScreen = "adventure";
        } else {
          currentScreen = screen;
        }

        modalState = null;
        selectedDungeonKey = null;
        render();
      }

      function showModal(type, payload = {}) {
        modalState = { type, ...payload };
        renderModal();
      }

      function closeModal() {
        modalState = null;
        modalRoot.innerHTML = "";
      }

      function recruitCharacter() {
        const livingCount = livingCharacters().length;

        if (livingCount >= MAX_LIVING_ADVENTURERS) {
          showModal("notice", {
            title: "모험가 정원 초과",
            text: "길드의 모험가 정원이 가득 찼습니다.",
            icon: "🚫"
          });
          return;
        }

        if (state.gold < GACHA_COST) {
          showModal("notice", {
            title: "골드 부족",
            text: `모험가 소집에는 ${GACHA_COST}G가 필요합니다.`,
            icon: "🪙"
          });
          return;
        }

        const newcomer = createCharacter();
        state.gold -= GACHA_COST;
        state.characters.push(newcomer);
        addLog(`${GACHA_COST}G를 사용해 ${getCharacterName(newcomer)}을 소집했습니다.`);
        save();

        showModal("recruit", { characterId: newcomer.id });
        render();
      }

      function toggleParty(characterId) {
        if (state.dungeon) {
          return;
        }

        const character = state.characters.find(entry => entry.id === characterId);

        if (!character || !character.alive) {
          return;
        }

        const index = state.partyIds.indexOf(characterId);

        if (index >= 0) {
          state.partyIds.splice(index, 1);
        } else if (state.partyIds.length < 4) {
          state.partyIds.push(characterId);
        } else {
          showModal("notice", {
            title: "파티 정원 초과",
            text: "파티에는 최대 4명만 등록할 수 있습니다.",
            icon: "👥"
          });
          return;
        }

        save();
        render();
      }

      function selectRegisteredItem(key) {
        if (key === "none") {
          state.selectedItem = null;
        } else if (ITEM_DEFS[key] && (state.inventory[key] || 0) > 0) {
          state.selectedItem = key;
        }

        save();
        renderModal();
      }

      function buyItem(key) {
        const item = ITEM_DEFS[key];

        if (!item) {
          return;
        }

        if (state.gold < item.price) {
          showModal("notice", {
            title: "골드 부족",
            text: `${item.name} 구매에는 ${item.price}G가 필요합니다.`,
            icon: item.icon
          });
          return;
        }

        state.gold -= item.price;
        state.inventory[key] = (state.inventory[key] || 0) + 1;
        addLog(`${item.name} 1개를 ${item.price}G에 구매했습니다.`);
        save();
        render();
        renderModal();
      }

      function sellItem(key) {
        const item = ITEM_DEFS[key];

        if (!item || (state.inventory[key] || 0) <= 0) {
          return;
        }

        state.inventory[key] -= 1;
        state.gold += item.price;

        if (state.selectedItem === key && state.inventory[key] <= 0) {
          state.selectedItem = null;
        }

        addLog(`${item.name} 1개를 ${item.price}G에 판매했습니다.`);
        save();
        render();
        renderModal();
      }

      function generateEncounter(difficultyKey) {
        const difficulty = DIFFICULTIES[difficultyKey] || DIFFICULTIES.easy;
        const radius = Math.floor(difficulty.rangeSize / 2);
        const center = randomInt(4 + radius, 24 - radius);
        const baseReward = randomInt(28, 42);

        return {
          id: uid(),
          name: pick(ENCOUNTER_NAMES),
          min: center - radius,
          max: center + radius,
          baseReward,
          reward: Math.floor(baseReward * difficulty.rewardMultiplier)
        };
      }

      function startDungeon(difficultyKey) {
        if (state.dungeon) {
          return;
        }

        const members = alivePartyMembers();

        if (members.length !== 4) {
          showModal("notice", {
            title: "파티 편성 필요",
            text: "던전에 출발하려면 생존한 파티원 4명이 필요합니다.",
            icon: "👥"
          });
          return;
        }

        const difficulty = DIFFICULTIES[difficultyKey];

        if (!difficulty) {
          return;
        }

        let carriedItem = state.selectedItem;

        if (carriedItem && (state.inventory[carriedItem] || 0) <= 0) {
          carriedItem = null;
          state.selectedItem = null;
        }

        members.forEach(character => {
          character.injured = false;
        });

        state.selectedDifficulty = difficultyKey;
        state.lastSummary = null;
        state.dungeon = {
          encounters: [
            generateEncounter(difficultyKey),
            generateEncounter(difficultyKey),
            generateEncounter(difficultyKey)
          ],
          difficulty: difficultyKey,
          index: 0,
          phase: "ready",
          earnedGold: 0,
          lastRolls: [],
          lastSuccess: null,
          survivalResults: [],
          startedPartyIds: [...state.partyIds],
          startingTraumaIds: members
            .filter(character => character.trauma)
            .map(character => character.id),
          encounterReports: [],
          carriedItem,
          itemUsed: false,
          bandageTargetMode: false,
          ropeRerolled: false,
          traumaSkips: {}
        };

        addLog(
          `${members.map(getCharacterName).join(", ")} 파티가 ${difficulty.name} 던전에 입장했습니다.`
        );

        save();
        closeModal();
        currentScreen = "adventure";
        render();
      }

      function prepareTraumaSkips() {
        const dungeon = state.dungeon;

        if (!dungeon) {
          return;
        }

        dungeon.traumaSkips = dungeon.traumaSkips || {};

        alivePartyMembers().forEach(character => {
          if (
            character.trauma &&
            !(character.id in dungeon.traumaSkips)
          ) {
            dungeon.traumaSkips[character.id] = Math.random() < 0.5;
          }
        });
      }

      function rollPartyDice() {
        prepareTraumaSkips();
        const traumaSkips = state.dungeon?.traumaSkips || {};

        return alivePartyMembers().map(character => {
          const skipped = Boolean(
            character.trauma && traumaSkips[character.id]
          );

          if (skipped) {
            return {
              characterId: character.id,
              name: getCharacterName(character),
              raw: null,
              modifier: 0,
              final: 0,
              skipped: true
            };
          }

          const raw = randomInt(1, 6);
          const modifier = character.injured
            ? Math.random() < 0.5
              ? -2
              : 2
            : 0;

          return {
            characterId: character.id,
            name: getCharacterName(character),
            raw,
            modifier,
            final: clamp(raw + modifier, 1, 6),
            skipped: false
          };
        });
      }

      function rollEncounter() {
        const dungeon = state.dungeon;

        if (!dungeon || dungeon.phase !== "ready") {
          return;
        }

        dungeon.bandageTargetMode = false;
        dungeon.lastRolls = rollPartyDice();
        dungeon.lastSuccess = null;
        dungeon.survivalResults = [];

        const ropeReady =
          dungeon.carriedItem === "rope" &&
          !dungeon.itemUsed &&
          (state.inventory.rope || 0) > 0;

        if (ropeReady) {
          dungeon.phase = "rolled";
          save();
          render();
          return;
        }

        resolveCurrentRolls();
      }

      function resolveCurrentRolls() {
        const dungeon = state.dungeon;

        if (
          !dungeon ||
          !["ready", "rolled"].includes(dungeon.phase) ||
          !dungeon.lastRolls.length
        ) {
          return;
        }

        const encounter = dungeon.encounters[dungeon.index];
        const total = dungeon.lastRolls.reduce(
          (sum, roll) => sum + roll.final,
          0
        );
        const success = total >= encounter.min && total <= encounter.max;

        dungeon.lastSuccess = success;
        dungeon.survivalResults = [];

        if (success) {
          dungeon.earnedGold += encounter.reward;
          addLog(
            `${encounter.name} 성공: 합계 ${total}, 성공 범위 ${encounter.min}~${encounter.max}, +${encounter.reward}G`
          );
        } else {
          const difficulty = DIFFICULTIES[dungeon.difficulty] || DIFFICULTIES.easy;
          const results = alivePartyMembers().map(character => {
            const survivalRoll = randomInt(1, 6);
            let result = "safe";

            if (survivalRoll === 1) {
              character.alive = false;
              character.injured = false;
              result = "dead";
              character.deathRecord = {
                difficultyKey: dungeon.difficulty,
                difficultyName: difficulty.name,
                encounterName: encounter.name,
                encounterIndex: dungeon.index + 1,
                survivalRoll,
                diedAt: new Date().toISOString(),
                successCount: Number(character.successCount) || 0
              };
            } else if (survivalRoll === 2) {
              character.trauma = true;
              result = "trauma";
            } else if (survivalRoll === 3) {
              character.injured = true;
              result = "injured";
            }

            return {
              characterId: character.id,
              name: getCharacterName(character),
              roll: survivalRoll,
              result
            };
          });

          dungeon.survivalResults = results;
          addLog(`${encounter.name} 실패: 합계 ${total}, 생존 판정을 진행했습니다.`);
        }

        dungeon.encounterReports[dungeon.index] = {
          index: dungeon.index,
          name: encounter.name,
          min: encounter.min,
          max: encounter.max,
          reward: encounter.reward,
          total,
          success,
          rolls: dungeon.lastRolls.map(roll => ({ ...roll })),
          survivalResults: dungeon.survivalResults.map(result => ({ ...result }))
        };

        dungeon.phase = "resolved";
        save();
        render();
      }

      function confirmRolledResult() {
        if (state.dungeon?.phase === "rolled") {
          resolveCurrentRolls();
        }
      }

      function useRope() {
        const dungeon = state.dungeon;

        if (
          !dungeon ||
          dungeon.phase !== "rolled" ||
          dungeon.carriedItem !== "rope" ||
          dungeon.itemUsed ||
          (state.inventory.rope || 0) <= 0
        ) {
          return;
        }

        state.inventory.rope -= 1;
        dungeon.itemUsed = true;
        dungeon.ropeRerolled = true;
        dungeon.lastRolls = rollPartyDice();
        addLog("밧줄 1개를 사용해 파티 전체의 주사위를 다시 굴렸습니다.");
        resolveCurrentRolls();
      }

      function showBandageTargets() {
        const dungeon = state.dungeon;

        if (
          !dungeon ||
          dungeon.phase !== "ready" ||
          dungeon.carriedItem !== "bandage" ||
          dungeon.itemUsed ||
          (state.inventory.bandage || 0) <= 0
        ) {
          return;
        }

        const injuredIds = alivePartyMembers()
          .filter(character => character.injured)
          .map(character => character.id);

        if (!injuredIds.length) {
          showModal("notice", {
            title: "치료 대상 없음",
            text: "현재 부상한 파티원이 없습니다.",
            icon: "🩹"
          });
          return;
        }

        showModal("bandage", { injuredIds });
      }

      function useBandage(characterId) {
        const dungeon = state.dungeon;
        const character = state.characters.find(entry => entry.id === characterId);

        if (
          !dungeon ||
          dungeon.phase !== "ready" ||
          dungeon.carriedItem !== "bandage" ||
          dungeon.itemUsed ||
          (state.inventory.bandage || 0) <= 0 ||
          !character ||
          !character.alive ||
          !character.injured ||
          !state.partyIds.includes(character.id)
        ) {
          return;
        }

        state.inventory.bandage -= 1;
        dungeon.itemUsed = true;
        character.injured = false;
        addLog(`붕대 1개를 사용해 ${getCharacterName(character)}의 부상을 치료했습니다.`);
        save();
        closeModal();
        render();
      }

      function advanceDungeon() {
        const dungeon = state.dungeon;

        if (!dungeon || dungeon.phase !== "resolved") {
          return;
        }

        const noSurvivors = alivePartyMembers().length === 0;
        const isLast = dungeon.index >= dungeon.encounters.length - 1;

        if (noSurvivors || isLast) {
          finishDungeon(noSurvivors);
          return;
        }

        dungeon.index += 1;
        dungeon.phase = "ready";
        dungeon.lastRolls = [];
        dungeon.lastSuccess = null;
        dungeon.survivalResults = [];
        dungeon.traumaSkips = {};
        save();
        render();
      }

      function finishDungeon(partyWiped = false) {
        const dungeon = state.dungeon;

        if (!dungeon) {
          return;
        }

        const startedMembers = dungeon.startedPartyIds
          .map(id => state.characters.find(character => character.id === id))
          .filter(Boolean);
        const survivors = startedMembers.filter(character => character.alive);
        const injuredIds = survivors
          .filter(character => character.injured)
          .map(character => character.id);
        const injuryMultiplier = Math.max(0.4, 1 - injuredIds.length * 0.15);

        if (!partyWiped) {
          survivors.forEach(character => {
            character.successCount = (character.successCount || 0) + 1;
          });
        }

        let lockpickUsed = false;
        let boostedGold = dungeon.earnedGold;

        if (
          !partyWiped &&
          dungeon.carriedItem === "lockpick" &&
          !dungeon.itemUsed &&
          (state.inventory.lockpick || 0) > 0
        ) {
          state.inventory.lockpick -= 1;
          lockpickUsed = true;
          boostedGold = Math.floor(dungeon.earnedGold * 1.5);
        }

        const finalGold = partyWiped
          ? 0
          : Math.floor(boostedGold * injuryMultiplier);

        state.gold += finalGold;

        const startingTraumaIds = new Set(dungeon.startingTraumaIds || []);
        const newTraumaIds = startedMembers
          .filter(
            character =>
              character.trauma && !startingTraumaIds.has(character.id)
          )
          .map(character => character.id);

        const snapshots = startedMembers.map(character =>
          characterSnapshot(character, injuredIds.includes(character.id))
        );

        state.lastSummary = {
          difficulty: dungeon.difficulty || "easy",
          earnedGold: dungeon.earnedGold,
          boostedGold,
          lockpickUsed,
          injuredCount: injuredIds.length,
          multiplier: injuryMultiplier,
          finalGold,
          partyWiped,
          survivors: survivors.length,
          successAwarded: partyWiped ? 0 : survivors.length,
          carriedItem: dungeon.carriedItem,
          memberSnapshots: snapshots,
          deadIds: startedMembers
            .filter(character => !character.alive)
            .map(character => character.id),
          injuredIds,
          newTraumaIds,
          encounterReports: (dungeon.encounterReports || []).filter(Boolean),
          completedAt: new Date().toISOString()
        };

        state.characters.forEach(character => {
          if (character.alive) {
            character.injured = false;
          }
        });

        state.partyIds = state.partyIds.filter(id => {
          const character = state.characters.find(entry => entry.id === id);
          return Boolean(character && character.alive);
        });

        if (
          dungeon.carriedItem &&
          (state.inventory[dungeon.carriedItem] || 0) <= 0
        ) {
          state.selectedItem = null;
        }

        addLog(
          partyWiped
            ? `원정대 전멸. 누적 보상 ${dungeon.earnedGold}G를 회수하지 못했습니다.`
            : `던전 정산 완료: 최종 ${finalGold}G 획득.`
        );

        state.dungeon = null;
        currentScreen = "result";
        save();
        render();
      }

      function startDungeonAuto(difficultyKey) {
        if (state.dungeon) {
          return;
        }

        const members = alivePartyMembers();

        if (members.length !== 4) {
          showModal("notice", {
            title: "파티 편성 필요",
            text: "던전에 출발하려면 생존한 파티원 4명이 필요합니다.",
            icon: "👥"
          });
          return;
        }

        const difficulty = DIFFICULTIES[difficultyKey];

        if (!difficulty) {
          return;
        }

        members.forEach(character => {
          character.injured = false;
        });

        const startedPartyIds = [...state.partyIds];
        const startingTraumaIds = members
          .filter(character => character.trauma)
          .map(character => character.id);

        const encounters = [
          generateEncounter(difficultyKey),
          generateEncounter(difficultyKey),
          generateEncounter(difficultyKey)
        ];

        let earnedGold = 0;
        const encounterReports = [];
        let partyWiped = false;

        addLog(
          `${members.map(getCharacterName).join(", ")} 파티가 ${difficulty.name}에 입장했습니다.`
        );

        for (let index = 0; index < encounters.length; index += 1) {
          const encounter = encounters[index];
          const alive = alivePartyMembers();

          if (alive.length === 0) {
            partyWiped = true;
            break;
          }

          const traumaSkips = {};
          alive.forEach(character => {
            if (character.trauma) {
              traumaSkips[character.id] = Math.random() < 0.5;
            }
          });

          const rolls = alive.map(character => {
            const skipped = Boolean(character.trauma && traumaSkips[character.id]);

            if (skipped) {
              return {
                characterId: character.id,
                name: getCharacterName(character),
                raw: null,
                modifier: 0,
                final: 0,
                skipped: true
              };
            }

            const raw = randomInt(1, 6);
            const modifier = character.injured
              ? Math.random() < 0.5
                ? -2
                : 2
              : 0;

            return {
              characterId: character.id,
              name: getCharacterName(character),
              raw,
              modifier,
              final: clamp(raw + modifier, 1, 6),
              skipped: false
            };
          });

          const total = rolls.reduce((sum, roll) => sum + roll.final, 0);
          const success = total >= encounter.min && total <= encounter.max;
          let survivalResults = [];

          if (success) {
            earnedGold += encounter.reward;
            addLog(
              `${encounter.name} 성공: 합계 ${total}, 성공 범위 ${encounter.min}~${encounter.max}, +${encounter.reward}G`
            );
          } else {
            survivalResults = alive.map(character => {
              const survivalRoll = randomInt(1, 6);
              let result = "safe";

              if (survivalRoll === 1) {
                character.alive = false;
                character.injured = false;
                result = "dead";
                character.deathRecord = {
                  difficultyKey,
                  difficultyName: difficulty.name,
                  encounterName: encounter.name,
                  encounterIndex: index + 1,
                  survivalRoll,
                  diedAt: new Date().toISOString(),
                  successCount: Number(character.successCount) || 0
                };
              } else if (survivalRoll === 2) {
                character.trauma = true;
                result = "trauma";
              } else if (survivalRoll === 3) {
                character.injured = true;
                result = "injured";
              }

              return {
                characterId: character.id,
                name: getCharacterName(character),
                roll: survivalRoll,
                result
              };
            });

            addLog(`${encounter.name} 실패: 합계 ${total}, 생존 판정을 진행했습니다.`);
          }

          encounterReports.push({
            index,
            name: encounter.name,
            min: encounter.min,
            max: encounter.max,
            reward: encounter.reward,
            total,
            success,
            rolls,
            survivalResults
          });
        }

        if (alivePartyMembers().length === 0) {
          partyWiped = true;
        }

        finalizeDungeonRun({
          difficultyKey,
          startedPartyIds,
          startingTraumaIds,
          earnedGold,
          encounterReports,
          partyWiped
        });
      }

      function finalizeDungeonRun({
        difficultyKey,
        startedPartyIds,
        startingTraumaIds,
        earnedGold,
        encounterReports,
        partyWiped
      }) {
        const difficulty = DIFFICULTIES[difficultyKey] || DIFFICULTIES.easy;
        const startedMembers = startedPartyIds
          .map(id => state.characters.find(character => character.id === id))
          .filter(Boolean);
        const survivors = startedMembers.filter(character => character.alive);
        const injuredIds = survivors
          .filter(character => character.injured)
          .map(character => character.id);
        const injuryMultiplier = Math.max(0.4, 1 - injuredIds.length * 0.15);

        if (!partyWiped) {
          survivors.forEach(character => {
            character.successCount = (character.successCount || 0) + 1;
          });
        }

        const finalGold = partyWiped ? 0 : Math.floor(earnedGold * injuryMultiplier);
        state.gold += finalGold;

        const startingTraumaSet = new Set(startingTraumaIds || []);
        const newTraumaIds = startedMembers
          .filter(
            character => character.trauma && !startingTraumaSet.has(character.id)
          )
          .map(character => character.id);

        const snapshots = startedMembers.map(character =>
          characterSnapshot(character, injuredIds.includes(character.id))
        );

        state.lastSummary = {
          difficulty: difficultyKey,
          earnedGold,
          boostedGold: earnedGold,
          lockpickUsed: false,
          injuredCount: injuredIds.length,
          multiplier: injuryMultiplier,
          finalGold,
          partyWiped,
          survivors: survivors.length,
          successAwarded: partyWiped ? 0 : survivors.length,
          carriedItem: null,
          memberSnapshots: snapshots,
          deadIds: startedMembers
            .filter(character => !character.alive)
            .map(character => character.id),
          injuredIds,
          newTraumaIds,
          encounterReports,
          completedAt: new Date().toISOString()
        };

        state.characters.forEach(character => {
          if (character.alive) {
            character.injured = false;
          }
        });

        state.partyIds = state.partyIds.filter(id => {
          const character = state.characters.find(entry => entry.id === id);
          return Boolean(character && character.alive);
        });

        addLog(
          partyWiped
            ? `원정대 전멸. 누적 보상 ${earnedGold}G를 회수하지 못했습니다.`
            : `던전 정산 완료: 최종 ${finalGold}G 획득.`
        );

        state.dungeon = null;
        currentScreen = "result";
        closeModal();
        save();
        render();
      }
