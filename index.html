<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#17111f">
<title>길드 마스터 시뮬레이터</title>

<style>
:root {
  --bg: #120d18;
  --panel: rgba(31, 23, 42, 0.96);
  --line: rgba(255, 255, 255, 0.11);
  --text: #f5f0fa;
  --muted: #b9abc6;
  --accent: #e2b960;
  --safe: #8fdda7;
  --danger: #ef7f83;
  --injury: #f2b46f;
  --trauma: #c593ed;
  --blue: #8eb8ff;
  --shadow: 0 18px 45px rgba(0, 0, 0, 0.34);
  --topbar-height: 62px;
}

* {
  box-sizing: border-box;
}

html,
body {
  width: 100%;
  min-height: 100%;
  margin: 0;
  color: var(--text);
  background:
    radial-gradient(circle at 18% 5%, rgba(126, 79, 166, 0.23), transparent 33%),
    radial-gradient(circle at 85% 95%, rgba(191, 137, 58, 0.13), transparent 34%),
    var(--bg);
  font-family:
    Pretendard,
    "Noto Sans KR",
    system-ui,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;
}

body {
  overflow: hidden;
  overscroll-behavior: none;
}

button {
  border: 0;
  color: inherit;
  font: inherit;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.38;
  filter: grayscale(0.25);
}

strong {
  font-weight: 900;
}

.app {
  min-height: 100dvh;
  display: grid;
  grid-template-rows: var(--topbar-height) minmax(0, 1fr);
}

.topbar {
  z-index: 20;
  display: grid;
  grid-template-columns: minmax(220px, 1fr) auto minmax(320px, 1fr);
  align-items: center;
  gap: 16px;
  height: var(--topbar-height);
  padding: 0 18px;
  border-bottom: 1px solid var(--line);
  background: rgba(15, 10, 21, 0.91);
  backdrop-filter: blur(14px);
  box-shadow: 0 10px 25px rgba(0, 0, 0, 0.18);
}

.brand {
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand-mark {
  display: grid;
  place-items: center;
  width: 38px;
  height: 38px;
  flex: 0 0 auto;
  border-radius: 12px;
  color: #25180b;
  background: linear-gradient(135deg, #f4d68b, #c58f35);
  box-shadow:
    inset 0 1px rgba(255, 255, 255, 0.55),
    0 8px 20px rgba(226, 185, 96, 0.18);
  font-size: 1.2rem;
}

.brand-copy {
  min-width: 0;
}

.brand-copy h1 {
  overflow: hidden;
  margin: 0;
  white-space: nowrap;
  text-overflow: ellipsis;
  font-size: 1.02rem;
  letter-spacing: -0.02em;
}

.brand-copy p {
  overflow: hidden;
  margin: 2px 0 0;
  color: var(--muted);
  white-space: nowrap;
  text-overflow: ellipsis;
  font-size: 0.68rem;
}

.main-nav {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 5px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.035);
}

.nav-btn {
  min-height: 38px;
  padding: 0 16px;
  border-radius: 10px;
  color: var(--muted);
  background: transparent;
  font-size: 0.8rem;
  font-weight: 850;
}

.nav-btn.active {
  color: #241708;
  background: linear-gradient(135deg, #f1d17e, #c8943c);
  box-shadow: 0 6px 16px rgba(226, 185, 96, 0.17);
}

.resources {
  min-width: 0;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  gap: 8px;
}

.resource-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  min-height: 38px;
  padding: 0 11px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.035);
  white-space: nowrap;
}

.resource-pill span {
  color: var(--muted);
  font-size: 0.67rem;
}

.resource-pill b {
  font-size: 0.82rem;
}

.resource-pill.gold b {
  color: #f2cf79;
}

.resource-pill.dead b {
  color: #ffaaa9;
}

.screen-shell {
  min-height: 0;
  overflow: hidden;
}

.game-screen {
  height: 100%;
  overflow: auto;
  padding: 16px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255, 255, 255, 0.18) transparent;
}

.page-grid {
  min-height: 100%;
  display: grid;
  gap: 14px;
}

.home-grid {
  grid-template-columns: minmax(330px, 0.92fr) minmax(430px, 1.35fr);
}

.party-grid {
  grid-template-columns: minmax(520px, 1.55fr) minmax(330px, 0.85fr);
}

.adventure-grid {
  grid-template-columns: minmax(500px, 1.45fr) minmax(320px, 0.8fr);
}

.result-grid {
  grid-template-columns: minmax(440px, 1fr) minmax(420px, 1fr);
}

.column-stack {
  min-height: 0;
  display: grid;
  gap: 14px;
}

.home-left {
  grid-template-rows: auto minmax(0, 1fr);
}

.home-right {
  grid-template-rows: auto minmax(0, 1fr);
}

.party-right {
  grid-template-rows: auto auto minmax(0, 1fr) auto;
}

.adventure-right {
  grid-template-rows: auto minmax(0, 1fr) auto;
}

.result-left {
  grid-template-rows: auto minmax(0, 1fr) auto;
}

.panel {
  min-width: 0;
  min-height: 0;
  padding: 15px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background:
    linear-gradient(
      160deg,
      rgba(41, 30, 54, 0.96),
      rgba(27, 20, 37, 0.96)
    );
  box-shadow: var(--shadow);
}

.panel.scroll {
  overflow: auto;
}

.panel-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 12px;
}

.panel-title {
  margin: 0;
  font-size: 0.97rem;
  letter-spacing: -0.02em;
}

.panel-subtitle {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 0.72rem;
  line-height: 1.5;
}

.hero-panel {
  position: relative;
  overflow: hidden;
  padding: 22px;
  background:
    linear-gradient(
      100deg,
      rgba(34, 23, 45, 0.98),
      rgba(47, 31, 62, 0.89)
    ),
    radial-gradient(
      circle at 90% 10%,
      rgba(226, 185, 96, 0.28),
      transparent 45%
    );
}

.hero-panel::after {
  content: "⚔";
  position: absolute;
  right: 22px;
  bottom: -24px;
  color: rgba(255, 255, 255, 0.045);
  font-size: 9rem;
  transform: rotate(-12deg);
  pointer-events: none;
}

.hero-label {
  display: inline-flex;
  align-items: center;
  min-height: 25px;
  padding: 0 9px;
  border: 1px solid rgba(226, 185, 96, 0.34);
  border-radius: 999px;
  color: #f2d994;
  background: rgba(226, 185, 96, 0.08);
  font-size: 0.68rem;
  font-weight: 900;
}

.hero-panel h2 {
  max-width: 620px;
  margin: 13px 0 7px;
  font-size: clamp(1.35rem, 3vw, 2.15rem);
  line-height: 1.15;
  letter-spacing: -0.045em;
}

.hero-panel p {
  max-width: 620px;
  margin: 0;
  color: var(--muted);
  font-size: 0.78rem;
  line-height: 1.65;
}

.hero-actions,
.button-row,
.inline-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.hero-actions {
  margin-top: 17px;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  min-height: 42px;
  padding: 0 15px;
  border: 1px solid transparent;
  border-radius: 12px;
  font-size: 0.78rem;
  font-weight: 900;
}

.btn.primary {
  color: #251708;
  background: linear-gradient(135deg, #f0cf76, #c58d34);
  box-shadow: 0 8px 18px rgba(226, 185, 96, 0.16);
}

.btn.secondary {
  border-color: var(--line);
  background: rgba(255, 255, 255, 0.055);
}

.btn.blue {
  color: #101827;
  background: linear-gradient(135deg, #b9d1ff, #78a8f8);
}

.btn.danger {
  color: #fff;
  border-color: rgba(239, 127, 131, 0.28);
  background: rgba(164, 59, 67, 0.55);
}

.btn.wide {
  width: 100%;
  min-height: 48px;
}

.btn.small {
  min-height: 34px;
  padding: 0 10px;
  font-size: 0.7rem;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 9px;
}

.stat-card {
  min-width: 0;
  padding: 13px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.035);
}

.stat-card span,
.summary-card span {
  display: block;
  color: var(--muted);
  font-size: 0.65rem;
}

.stat-card strong {
  display: block;
  overflow: hidden;
  margin-top: 5px;
  white-space: nowrap;
  text-overflow: ellipsis;
  font-size: 1rem;
}

.stat-card.gold strong {
  color: #f3d17c;
}

.stat-card.safe strong {
  color: var(--safe);
}

.stat-card.danger strong {
  color: #ffaaa9;
}

.stat-card.trauma strong {
  color: #d9a7fa;
}

.shop-grid,
.difficulty-grid,
.party-slots,
.roll-grid,
.outcome-grid,
.summary-grid {
  display: grid;
  gap: 9px;
}

.shop-grid {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.difficulty-grid {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.party-slots,
.roll-grid,
.outcome-grid {
  grid-template-columns: repeat(2, minmax(0, 1fr));
}

.summary-grid {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.shop-card,
.difficulty-card,
.party-slot,
.roll-card,
.outcome-card,
.summary-card,
.mini-character,
.report-row {
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.035);
}

.shop-card {
  display: grid;
  grid-template-rows: auto auto minmax(34px, 1fr) auto;
  gap: 5px;
  padding: 11px;
}

.shop-head,
.card-top,
.line-between {
  min-width: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 9px;
}

.shop-icon {
  font-size: 1.4rem;
}

.shop-count,
.badge {
  display: inline-flex;
  align-items: center;
  min-height: 23px;
  padding: 0 7px;
  border-radius: 999px;
  color: #d9cee5;
  background: rgba(255, 255, 255, 0.07);
  font-size: 0.64rem;
  font-weight: 900;
  white-space: nowrap;
}

.shop-name {
  font-size: 0.79rem;
  font-weight: 900;
}

.shop-desc {
  color: var(--muted);
  font-size: 0.64rem;
  line-height: 1.45;
}

.activity-list,
.grave-list,
.report-list {
  display: grid;
  gap: 7px;
}

.activity-row {
  display: grid;
  grid-template-columns: 72px minmax(0, 1fr);
  gap: 10px;
  padding: 9px 10px;
  border: 1px solid rgba(255, 255, 255, 0.07);
  border-radius: 11px;
  background: rgba(255, 255, 255, 0.025);
  font-size: 0.69rem;
  line-height: 1.45;
}

.activity-row time {
  color: #8f809d;
}

.empty-state {
  display: grid;
  place-items: center;
  min-height: 130px;
  padding: 20px;
  border: 1px dashed rgba(255, 255, 255, 0.14);
  border-radius: 14px;
  color: var(--muted);
  text-align: center;
  font-size: 0.75rem;
  line-height: 1.6;
}

.last-result {
  display: grid;
  grid-template-columns: auto minmax(0, 1fr) auto;
  align-items: center;
  gap: 12px;
  padding: 12px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.035);
}

.result-emblem {
  display: grid;
  place-items: center;
  width: 44px;
  height: 44px;
  border-radius: 13px;
  background: rgba(255, 255, 255, 0.07);
  font-size: 1.3rem;
}

.last-result h3 {
  margin: 0;
  font-size: 0.84rem;
}

.last-result p {
  margin: 4px 0 0;
  color: var(--muted);
  font-size: 0.68rem;
}

.last-result strong {
  color: #f3d17c;
  font-size: 0.94rem;
  white-space: nowrap;
}

.roster-panel {
  display: grid;
  grid-template-rows: auto minmax(0, 1fr);
  overflow: hidden;
}

.roster-grid {
  min-height: 0;
  overflow: auto;
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  align-content: start;
  gap: 9px;
  padding-right: 3px;
}

.character-card {
  min-width: 0;
  padding: 11px;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.035);
  cursor: pointer;
  user-select: none;
}

.character-card.selected {
  border-color: var(--accent);
  background:
    linear-gradient(
      150deg,
      rgba(226, 185, 96, 0.17),
      rgba(255, 255, 255, 0.04)
    );
}

.character-card .avatar,
.party-avatar {
  display: grid;
  place-items: center;
  width: 34px;
  height: 34px;
  flex: 0 0 auto;
  border-radius: 10px;
  background: rgba(255, 255, 255, 0.075);
  font-size: 1.05rem;
}

.character-card h3 {
  overflow: hidden;
  margin: 9px 0 2px;
  white-space: nowrap;
  text-overflow: ellipsis;
  font-size: 0.78rem;
}

.job-line {
  overflow: hidden;
  color: var(--muted);
  white-space: nowrap;
  text-overflow: ellipsis;
  font-size: 0.65rem;
}

.chip-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 7px;
}

.chip {
  display: inline-flex;
  align-items: center;
  min-height: 20px;
  padding: 0 6px;
  border: 1px solid rgba(255, 255, 255, 0.07);
  border-radius: 999px;
  color: #d3c6df;
  background: rgba(255, 255, 255, 0.04);
  font-size: 0.58rem;
  font-weight: 800;
}

.chip.trauma {
  color: #e3bcff;
  border-color: rgba(197, 147, 237, 0.26);
  background: rgba(130, 74, 170, 0.18);
}

.chip.injury {
  color: #ffd1a0;
  border-color: rgba(242, 180, 111, 0.27);
  background: rgba(166, 104, 43, 0.18);
}

.chip.safe {
  color: #b9f0c9;
}

.personality {
  overflow: hidden;
  margin-top: 7px;
  color: #dcb8ef;
  white-space: nowrap;
  text-overflow: ellipsis;
  font-size: 0.62rem;
}

.success-count {
  margin-top: 7px;
  color: #e9dba4;
  font-size: 0.61rem;
  font-weight: 850;
}

.difficulty-card {
  padding: 11px;
  color: var(--text);
  text-align: left;
}

.difficulty-card.selected {
  color: #261809;
  border-color: var(--accent);
  background: linear-gradient(135deg, #efd07e, #c58f38);
}

.difficulty-card strong {
  display: block;
  font-size: 0.76rem;
}

.difficulty-card span {
  display: block;
  margin-top: 3px;
  opacity: 0.78;
  font-size: 0.61rem;
  line-height: 1.4;
}

.party-slot {
  min-height: 94px;
  padding: 10px;
}

.party-slot.empty {
  display: grid;
  place-items: center;
  border-style: dashed;
  color: #8f809d;
  text-align: center;
  font-size: 0.68rem;
}

.party-slot h3 {
  overflow: hidden;
  margin: 0;
  white-space: nowrap;
  text-overflow: ellipsis;
  font-size: 0.74rem;
}

.party-slot p {
  overflow: hidden;
  margin: 4px 0 0;
  color: var(--muted);
  white-space: nowrap;
  text-overflow: ellipsis;
  font-size: 0.61rem;
}

.carry-list {
  display: grid;
  gap: 7px;
}

.carry-option {
  display: grid;
  grid-template-columns: 36px minmax(0, 1fr) auto;
  align-items: center;
  gap: 9px;
  padding: 9px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.035);
  text-align: left;
}

.carry-option.selected {
  border-color: var(--accent);
  background: rgba(226, 185, 96, 0.1);
}

.item-emoji {
  font-size: 1.25rem;
  text-align: center;
}

.carry-option strong {
  display: block;
  font-size: 0.72rem;
}

.carry-option span span {
  display: block;
  margin-top: 2px;
  color: var(--muted);
  font-size: 0.59rem;
}

.prep-summary {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 7px;
}

.prep-summary div {
  min-width: 0;
  padding: 8px;
  border-radius: 11px;
  background: rgba(255, 255, 255, 0.04);
}

.prep-summary span {
  display: block;
  color: var(--muted);
  font-size: 0.58rem;
}

.prep-summary strong {
  display: block;
  overflow: hidden;
  margin-top: 3px;
  white-space: nowrap;
  text-overflow: ellipsis;
  font-size: 0.72rem;
}

.progress-track {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 7px;
  margin-bottom: 12px;
}

.progress-step {
  min-width: 0;
  padding: 8px;
  border: 1px solid var(--line);
  border-radius: 11px;
  color: #9384a1;
  background: rgba(255, 255, 255, 0.025);
  text-align: center;
  font-size: 0.62rem;
  font-weight: 900;
}

.progress-step.current {
  color: #251708;
  border-color: var(--accent);
  background: var(--accent);
}

.progress-step.done {
  color: #c4f0d0;
  border-color: rgba(143, 221, 167, 0.35);
  background: rgba(75, 146, 94, 0.18);
}

.encounter-panel {
  display: grid;
  grid-template-rows: auto auto auto minmax(0, 1fr) auto;
  min-height: 100%;
  padding: 18px;
}

.encounter-header {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
}

.encounter-kicker {
  color: var(--accent);
  font-size: 0.62rem;
  font-weight: 950;
  letter-spacing: 0.09em;
}

.encounter-header h2 {
  margin: 5px 0 0;
  font-size: 1.22rem;
  letter-spacing: -0.035em;
}

.difficulty-badge {
  display: inline-flex;
  align-items: center;
  min-height: 28px;
  padding: 0 10px;
  border-radius: 999px;
  color: #261708;
  background: var(--accent);
  font-size: 0.66rem;
  font-weight: 950;
  white-space: nowrap;
}

.condition-row {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
  margin: 13px 0;
}

.condition-box {
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.035);
}

.condition-box span {
  display: block;
  color: var(--muted);
  font-size: 0.59rem;
}

.condition-box strong {
  display: block;
  margin-top: 4px;
  font-size: 0.82rem;
}

.condition-box.target strong {
  color: #f1d17c;
  font-size: 1.02rem;
}

.encounter-stage {
  min-height: 0;
  overflow: auto;
  padding-right: 3px;
}

.roll-card {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 42px;
  gap: 8px;
  align-items: center;
  padding: 9px;
}

.roll-card h3 {
  overflow: hidden;
  margin: 0;
  white-space: nowrap;
  text-overflow: ellipsis;
  font-size: 0.69rem;
}

.roll-card p {
  overflow: hidden;
  margin: 3px 0 0;
  color: var(--muted);
  white-space: nowrap;
  text-overflow: ellipsis;
  font-size: 0.57rem;
}

.die-face {
  display: grid;
  place-items: center;
  width: 42px;
  height: 42px;
  border: 1px solid rgba(255, 255, 255, 0.14);
  border-radius: 11px;
  color: #251708;
  background: #f3dfaa;
  font-size: 1.1rem;
  font-weight: 950;
}

.die-face.skipped {
  color: #e4c8f7;
  background: rgba(130, 74, 170, 0.28);
}

.result-banner {
  margin-top: 10px;
  padding: 10px 12px;
  border-radius: 12px;
  font-size: 0.72rem;
  font-weight: 950;
  line-height: 1.45;
}

.result-banner.success {
  color: #d7f7df;
  border: 1px solid rgba(143, 221, 167, 0.3);

<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">🏰</div>

      <div class="brand-copy">
        <h1>길드 마스터 시뮬레이터</h1>
        <p>모험가를 모집하고 파티를 편성해 던전으로 보내세요.</p>
      </div>
    </div>

    <nav class="main-nav">
      <button class="nav-btn" data-nav="home">길드 홀</button>
      <button class="nav-btn" data-nav="party">파티 구성</button>
    </nav>

    <div class="resources">
      <div class="resource-pill gold">
        <span>길드 자금</span>
        <b id="topGold">0 G</b>
      </div>

      <div class="resource-pill">
        <span>생존</span>
        <b id="topAlive">0명</b>
      </div>

      <div class="resource-pill dead">
        <span>사망</span>
        <b id="topDead">0명</b>
      </div>
    </div>
  </header>

  <main class="screen-shell">
    <section id="screen" class="game-screen"></section>
  </main>
</div>

<div class="orientation-overlay">
  <div class="orientation-card">
    <span class="phone">📱</span>
    <h2>화면을 가로로 돌려주세요</h2>
    <p>
      길드 마스터 시뮬레이터는 모바일 가로 화면에 맞춰
      설계되었습니다.
    </p>
  </div>
</div>

<script src="./game-db.js"></script>

<script>
(() => {
  "use strict";

  const STORAGE_KEY = "dicebound-expedition-v1";
  const SAVE_VERSION = 6;

  const GAME_DB = globalThis.GAME_DB;

  const requiredLists = [
    "firstNames",
    "lastNames",
    "jobs",
    "races",
    "genders",
    "personalities",
    "encounterNames"
  ];

  const databaseInvalid =
    !GAME_DB ||
    requiredLists.some(
      key =>
        !Array.isArray(GAME_DB[key]) ||
        GAME_DB[key].length === 0
    ) ||
    !GAME_DB.items ||
    !GAME_DB.difficulties;

  const screenEl = document.getElementById("screen");
  const topGoldEl = document.getElementById("topGold");
  const topAliveEl = document.getElementById("topAlive");
  const topDeadEl = document.getElementById("topDead");

  if (databaseInvalid) {
    screenEl.innerHTML = `
      <div class="panel" style="max-width:720px;margin:20px auto">
        <h2 class="panel-title">
          게임 데이터 파일을 불러오지 못했습니다.
        </h2>

        <p class="panel-subtitle">
          <strong>game-db.js</strong> 파일이 index.html과
          같은 폴더에 있는지 확인해 주세요.
        </p>
      </div>
    `;

    return;
  }

  const GACHA_COST =
    Number(GAME_DB.settings?.gachaCost) || 10;

  const STARTING_GOLD =
    Number(GAME_DB.settings?.startingGold) || 300;

  const DIFFICULTIES = GAME_DB.difficulties;
  const ITEM_DEFS = GAME_DB.items;
  const ENCOUNTER_NAMES = GAME_DB.encounterNames;

  const VALID_SCREENS = [
    "home",
    "party",
    "adventure",
    "result"
  ];

  function uid() {
    if (
      window.crypto &&
      typeof window.crypto.randomUUID === "function"
    ) {
      return window.crypto.randomUUID();
    }

    return `${Date.now()}-${Math.random()
      .toString(16)
      .slice(2)}`;
  }

  function randomInt(min, max) {
    return (
      Math.floor(Math.random() * (max - min + 1)) + min
    );
  }

  function pick(list) {
    return list[randomInt(0, list.length - 1)];
  }

  function clamp(value, min, max) {
    return Math.max(min, Math.min(max, value));
  }

  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function formatTime(iso) {
    try {
      return new Intl.DateTimeFormat("ko-KR", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      }).format(new Date(iso));
    } catch {
      return "";
    }
  }

  function findDbEntry(list, id) {
    if (!id || !Array.isArray(list)) {
      return null;
    }

    return (
      list.find(entry => entry.id === id) || null
    );
  }

  function getCharacterName(character) {
    if (character.legacyName) {
      return character.legacyName;
    }

    const firstName = findDbEntry(
      GAME_DB.firstNames,
      character.firstNameId
    );

    const lastName = findDbEntry(
      GAME_DB.lastNames,
      character.lastNameId
    );

    return (
      [firstName?.name, lastName?.name]
        .filter(Boolean)
        .join(" ") ||
      character.name ||
      "이름 없는 모험가"
    );
  }

  function getCharacterJob(character) {
    return (
      findDbEntry(
        GAME_DB.jobs,
        character.jobId
      ) || {
        id: null,
        name:
          character.legacyJobName ||
          character.job ||
          "무직",
        icon:
          character.legacyJobIcon ||
          character.icon ||
          "🧭",
        description:
          "이전 버전에서 모집된 모험가의 직업입니다."
      }
    );
  }

  function getCharacterProfile(character) {
    return {
      name: getCharacterName(character),

      job: getCharacterJob(character),

      race:
        findDbEntry(
          GAME_DB.races,
          character.raceId
        ) || {
          name: "미상"
        },

      gender:
        findDbEntry(
          GAME_DB.genders,
          character.genderId
        ) || {
          name: "미상"
        },

      personality:
        findDbEntry(
          GAME_DB.personalities,
          character.personalityId
        ) || {
          name: "성격 미상",
          description: ""
        }
    };
  }

  function characterSnapshot(
    character,
    injuredBeforeRecovery = character.injured
  ) {
    const profile = getCharacterProfile(character);

    return {
      id: character.id,
      name: profile.name,
      icon: profile.job.icon,
      job: profile.job.name,
      race: profile.race.name,
      gender: profile.gender.name,
      personality: profile.personality.name,
      alive: character.alive,
      trauma: character.trauma,
      injured: Boolean(injuredBeforeRecovery),
      successCount:
        Number(character.successCount) || 0
    };
  }

  function defaultState() {
    return {
      saveVersion: SAVE_VERSION,
      currentScreen: "home",
      gold: STARTING_GOLD,

      inventory: {
        rope: 0,
        bandage: 0,
        lockpick: 0
      },

      selectedItem: null,
      selectedDifficulty: "easy",
      characters: [],
      partyIds: [],
      dungeon: null,
      lastSummary: null,
      log: []
    };
  }

  function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);

      if (!raw) {
        return defaultState();
      }

      const parsed = JSON.parse(raw);
      const fresh = defaultState();

      const merged = {
        ...fresh,
        ...parsed,

        inventory: {
          ...fresh.inventory,
          ...(parsed.inventory || {})
        },

        characters:
          Array.isArray(parsed.characters)
            ? parsed.characters
            : [],

        partyIds:
          Array.isArray(parsed.partyIds)
            ? parsed.partyIds
            : [],

        log:
          Array.isArray(parsed.log)
            ? parsed.log
            : []
      };

      merged.saveVersion = SAVE_VERSION;

      merged.gold =
        Number.isFinite(Number(merged.gold))
          ? Number(merged.gold)
          : STARTING_GOLD;

      merged.selectedDifficulty =
        DIFFICULTIES[merged.selectedDifficulty]
          ? merged.selectedDifficulty
          : "easy";

      merged.currentScreen =
        VALID_SCREENS.includes(merged.currentScreen)
          ? merged.currentScreen
          : "home";

      merged.characters =
        merged.characters.map(character => {
          const firstName = findDbEntry(
            GAME_DB.firstNames,
            character.firstNameId
          );

          const lastName = findDbEntry(
            GAME_DB.lastNames,
            character.lastNameId
          );

          const matchedJob =
            findDbEntry(
              GAME_DB.jobs,
              character.jobId
            ) ||
            GAME_DB.jobs.find(
              job => job.name === character.job
            );

          const race = findDbEntry(
            GAME_DB.races,
            character.raceId
          );

          const gender = findDbEntry(
            GAME_DB.genders,
            character.genderId
          );

          const personality = findDbEntry(
            GAME_DB.personalities,
            character.personalityId
          );

          return {
            ...character,

            firstNameId:
              firstName?.id || null,

            lastNameId:
              lastName?.id || null,

            legacyName:
              character.legacyName ||
              (!(firstName && lastName)
                ? character.name || null
                : null),

            jobId:
              matchedJob?.id || null,

            legacyJobName:
              character.legacyJobName ||
              (!matchedJob
                ? character.job || null
                : null),

            legacyJobIcon:
              character.legacyJobIcon ||
              (!matchedJob
                ? character.icon || "🧭"
                : null),

            raceId:
              race?.id ||
              pick(GAME_DB.races).id,

            genderId:
              gender?.id ||
              pick(GAME_DB.genders).id,

            personalityId:
              personality?.id ||
              pick(GAME_DB.personalities).id,

            alive:
              character.alive !== false,

            injured:
              Boolean(character.injured),

            trauma:
              Boolean(character.trauma),

            successCount:
              Number.isFinite(
                Number(character.successCount)
              )
                ? Number(character.successCount)
                : 0
          };
        });

      if (merged.dungeon) {
        const difficultyKey =
          DIFFICULTIES[
            merged.dungeon.difficulty
          ]
            ? merged.dungeon.difficulty
            : merged.selectedDifficulty;

        const difficulty =
          DIFFICULTIES[difficultyKey];

        merged.dungeon = {
          carriedItem: null,
          itemUsed: false,
          bandageTargetMode: false,
          ropeRerolled: false,
          traumaSkips: {},
          startingTraumaIds: [],
          encounterReports: [],
          difficulty: difficultyKey,
          ...merged.dungeon
        };

        merged.dungeon.encounters =
          (merged.dungeon.encounters || [])
            .map(encounter => {
              if (
                Number.isFinite(
                  Number(encounter.min)
                ) &&
                Number.isFinite(
                  Number(encounter.max)
                )
              ) {
                return {
                  ...encounter,

                  min:
                    Number(encounter.min),

                  max:
                    Number(encounter.max),

                  baseReward:
                    Number.isFinite(
                      Number(
                        encounter.baseReward
                      )
                    )
                      ? Number(
                          encounter.baseReward
                        )
                      : Math.max(
                          1,
                          Math.round(
                            (Number(
                              encounter.reward
                            ) || 1) /
                              difficulty.rewardMultiplier
                          )
                        ),

                  reward:
                    Number(encounter.reward) || 1
                };
              }

              const radius =
                Math.floor(
                  difficulty.rangeSize / 2
                );

              const center =
                clamp(
                  Number(encounter.target) || 14,
                  4 + radius,
                  24 - radius
                );

              const oldReward =
                Number(encounter.reward) || 40;

              return {
                id:
                  encounter.id || uid(),

                name:
                  encounter.name ||
                  pick(ENCOUNTER_NAMES),

                min:
                  center - radius,

                max:
                  center + radius,

                baseReward:
                  Math.max(
                    1,
                    Math.round(
                      oldReward /
                        difficulty.rewardMultiplier
                    )
                  ),

                reward:
                  oldReward
              };
            });

        merged.currentScreen = "adventure";
      } else if (
        merged.currentScreen === "adventure"
      ) {
        merged.currentScreen =
          merged.lastSummary
            ? "result"
            : "home";
      }

      return merged;
    } catch (error) {
      console.warn(
        "저장 데이터를 불러오지 못했습니다.",
        error
      );

      return defaultState();
    }
  }

  let state = loadState();

  function save() {
    localStorage.setItem(
      STORAGE_KEY,
      JSON.stringify(state)
    );
  }

  function addLog(text) {
    state.log.unshift({
      id: uid(),
      time: new Date().toISOString(),
      text
    });

    state.log =
      state.log.slice(0, 100);
  }

  function createCharacter() {
    return {
      id: uid(),

      firstNameId:
        pick(GAME_DB.firstNames).id,

      lastNameId:
        pick(GAME_DB.lastNames).id,

      jobId:
        pick(GAME_DB.jobs).id,

      raceId:
        pick(GAME_DB.races).id,

      genderId:
        pick(GAME_DB.genders).id,

      personalityId:
        pick(GAME_DB.personalities).id,

      alive: true,
      injured: false,
      trauma: false,
      successCount: 0
    };
  }

  function livingCharacters() {
    return state.characters.filter(
      character => character.alive
    );
  }

  function deadCharacters() {
    return state.characters.filter(
      character => !character.alive
    );
  }

  function alivePartyMembers() {
    return state.partyIds
      .map(id =>
        state.characters.find(
          character => character.id === id
        )
      )
      .filter(
        character =>
          character && character.alive
      );
  }

  function setScreen(nextScreen) {
    if (state.dungeon) {
      state.currentScreen = "adventure";
    } else if (
      nextScreen === "result" &&
      !state.lastSummary
    ) {
      state.currentScreen = "home";
    } else if (
      ["home", "party", "result"]
        .includes(nextScreen)
    ) {
      state.currentScreen = nextScreen;
    }

    save();
    render();
  }

  function drawCharacters(count) {
    if (state.dungeon) {
      return;
    }

    const cost =
      count * GACHA_COST;

    if (state.gold < cost) {
      addLog(
        `모집 실패: ${cost}G가 필요하지만 현재 ${state.gold}G를 보유하고 있습니다.`
      );

      save();
      render();
      return;
    }

    state.gold -= cost;

    const newcomers =
      Array.from(
        { length: count },
        createCharacter
      );

    state.characters.push(...newcomers);

    addLog(
      `${cost}G를 사용해 ${newcomers
        .map(getCharacterName)
        .join(", ")} — ${count}명의 모험가를 모집했습니다.`
    );

    save();
    render();
  }

  function buyItem(key) {
    if (state.dungeon) {
      return;
    }

    const item = ITEM_DEFS[key];

    if (!item) {
      return;
    }

    if (state.gold < item.price) {
      addLog(
        `${item.name} 구매 실패: ${item.price}G가 필요합니다.`
      );

      save();
      render();
      return;
    }

    state.gold -= item.price;

    state.inventory[key] =
      (state.inventory[key] || 0) + 1;

    addLog(
      `${item.name} 1개를 ${item.price}G에 구매했습니다.`
    );

    save();
    render();
  }

  function toggleParty(characterId) {
    if (state.dungeon) {
      return;
    }

    const character =
      state.characters.find(
        entry => entry.id === characterId
      );

    if (!character || !character.alive) {
      return;
    }

    const index =
      state.partyIds.indexOf(characterId);

    if (index >= 0) {
      state.partyIds.splice(index, 1);
    } else if (state.partyIds.length < 4) {
      state.partyIds.push(characterId);
    }

    save();
    render();
  }

  function autoParty() {
    if (state.dungeon) {
      return;
    }

    state.partyIds =
      livingCharacters()
        .slice(0, 4)
        .map(character => character.id);

    save();
    render();
  }

  function clearParty() {
    if (state.dungeon) {
      return;
    }

    state.partyIds = [];

    save();
    render();
  }

  function selectDifficulty(key) {
    if (
      state.dungeon ||
      !DIFFICULTIES[key]
    ) {
      return;
    }

    state.selectedDifficulty = key;

    save();
    render();
  }

  function selectItem(key) {
    if (state.dungeon) {
      return;
    }

    if (key === "none") {
      state.selectedItem = null;
    } else if (
      ITEM_DEFS[key] &&
      (state.inventory[key] || 0) > 0
    ) {
      state.selectedItem =
        state.selectedItem === key
          ? null
          : key;
    }

    save();
    render();
  }

  function generateEncounter(
    difficultyKey
  ) {
    const difficulty =
      DIFFICULTIES[difficultyKey] ||
      DIFFICULTIES.easy;

    const radius =
      Math.floor(
        difficulty.rangeSize / 2
      );

    const center =
      randomInt(
        4 + radius,
        24 - radius
      );

    const baseReward =
      randomInt(28, 42);

    return {
      id: uid(),
      name: pick(ENCOUNTER_NAMES),
      min: center - radius,
      max: center + radius,
      baseReward,

      reward:
        Math.floor(
          baseReward *
            difficulty.rewardMultiplier
        )
    };
  }

  function startDungeon() {
    if (state.dungeon) {
      return;
    }

    const members =
      alivePartyMembers();

    if (members.length !== 4) {
      addLog(
        "던전 입장 실패: 생존한 파티원 4명이 필요합니다."
      );

      save();
      render();
      return;
    }

    const difficultyKey =
      DIFFICULTIES[
        state.selectedDifficulty
      ]
        ? state.selectedDifficulty
        : "easy";

    const difficulty =
      DIFFICULTIES[difficultyKey];

    let carriedItem =
      state.selectedItem;

    if (
      carriedItem &&
      (state.inventory[carriedItem] || 0) <= 0
    ) {
      carriedItem = null;
      state.selectedItem = null;
    }

    members.forEach(character => {
      character.injured = false;
    });

    state.dungeon = {
      encounters: [
        generateEncounter(
          difficultyKey
        ),
        generateEncounter(
          difficultyKey
        ),
        generateEncounter(
          difficultyKey
        )
      ],

      difficulty:
        difficultyKey,

      index: 0,
      phase: "ready",
      earnedGold: 0,
      lastRolls: [],
      lastSuccess: null,
      survivalResults: [],

      startedPartyIds:
        [...state.partyIds],

      startingTraumaIds:
        members
          .filter(
            character =>
              character.trauma
          )
          .map(
            character =>
              character.id
          ),

      encounterReports: [],
      carriedItem,
      itemUsed: false,
      bandageTargetMode: false,
      ropeRerolled: false,
      traumaSkips: {}
    };

    state.lastSummary = null;
    state.currentScreen = "adventure";

    const itemText =
      carriedItem
        ? ` 도구는 ${ITEM_DEFS[carriedItem].name}입니다.`
        : " 도구 없이 출발합니다.";

    addLog(
      `${members
        .map(getCharacterName)
        .join(", ")} 파티가 ${difficulty.name} 던전에 입장했습니다.${itemText}`
    );

    save();
    render();
  }

  function prepareTraumaSkips() {
    const dungeon = state.dungeon;

    if (!dungeon) {
      return;
    }

    dungeon.traumaSkips =
      dungeon.traumaSkips || {};

    alivePartyMembers()
      .forEach(character => {
        if (
          character.trauma &&
          !(
            character.id in
            dungeon.traumaSkips
          )
        ) {
          dungeon.traumaSkips[
            character.id
          ] = Math.random() < 0.5;
        }
      });
  }

  function rollPartyDice() {
    prepareTraumaSkips();

    const traumaSkips =
      state.dungeon?.traumaSkips || {};

    return alivePartyMembers()
      .map(character => {
        const skipped =
          Boolean(
            character.trauma &&
            traumaSkips[character.id]
          );

        if (skipped) {
          return {
            characterId:
              character.id,

            name:
              getCharacterName(
                character
              ),

            raw: null,
            modifier: 0,
            final: 0,
            skipped: true
          };
        }

        const raw =
          randomInt(1, 6);

        const modifier =
          character.injured
            ? Math.random() < 0.5
              ? -2
              : 2
            : 0;

        return {
          characterId:
            character.id,

          name:
            getCharacterName(
              character
            ),

          raw,
          modifier,

          final:
            clamp(
              raw + modifier,
              1,
              6
            ),

          skipped: false
        };
      });
  }

  function rollEncounter() {
    const dungeon = state.dungeon;

    if (
      !dungeon ||
      dungeon.phase !== "ready"
    ) {
      return;
    }

    dungeon.bandageTargetMode =
      false;

    dungeon.lastRolls =
      rollPartyDice();

    dungeon.lastSuccess = null;
    dungeon.survivalResults = [];

    const ropeReady =
      dungeon.carriedItem === "rope" &&
      !dungeon.itemUsed &&
      (state.inventory.rope || 0) > 0;

    if (ropeReady) {
      dungeon.phase = "rolled";

      addLog(
        `${dungeon.encounters[dungeon.index].name}: 주사위 결과를 확인했습니다. 밧줄로 한 번 재굴림할 수 있습니다.`
      );

      save();
      render();
      return;
    }

    resolveCurrentRolls();
  }

  function resolveCurrentRolls() {
    const dungeon = state.dungeon;

    if (
      !dungeon ||
      !["ready", "rolled"]
        .includes(dungeon.phase) ||
      !dungeon.lastRolls.length
    ) {
      return;
    }

    const encounter =
      dungeon.encounters[
        dungeon.index
      ];

    const total =
      dungeon.lastRolls.reduce(
        (sum, roll) =>
          sum + roll.final,
        0
      );

    const success =
      total >= encounter.min &&
      total <= encounter.max;

    dungeon.lastSuccess = success;
    dungeon.survivalResults = [];

    if (success) {
      dungeon.earnedGold +=
        encounter.reward;

      addLog(
        `${encounter.name} 성공: 합계 ${total}, 성공 범위 ${encounter.min}~${encounter.max}, +${encounter.reward}G`
      );
    } else {
      const results =
        alivePartyMembers()
          .map(character => {
            const survivalRoll =
              randomInt(1, 6);

            let result = "safe";

            if (survivalRoll === 1) {
              character.alive = false;
              character.injured = false;
              result = "dead";
            } else if (
              survivalRoll === 2
            ) {
              character.trauma = true;
              result = "trauma";
            } else if (
              survivalRoll === 3
            ) {
              character.injured = true;
              result = "injured";
            }

            return {
              characterId:
                character.id,

              name:
                getCharacterName(
                  character
                ),

              roll:
                survivalRoll,

              result
            };
          });

      dungeon.survivalResults =
        results;

      const deaths =
        results
          .filter(
            result =>
              result.result === "dead"
          )
          .map(
            result => result.name
          );

      const traumas =
        results
          .filter(
            result =>
              result.result ===
              "trauma"
          )
          .map(
            result => result.name
          );

      const injuries =
        results
          .filter(
            result =>
              result.result ===
              "injured"
          )
          .map(
            result => result.name
          );

      addLog(
        `${encounter.name} 실패: 합계 ${total}. ` +
        `${
          deaths.length
            ? `사망 ${deaths.join(", ")}. `
            : ""
        }` +
        `${
          traumas.length
            ? `트라우마 ${traumas.join(", ")}. `
            : ""
        }` +
        `${
          injuries.length
            ? `부상 ${injuries.join(", ")}.`
            : "추가 부상 없음."
        }`
      );
    }

    dungeon.encounterReports[
      dungeon.index
    ] = {
      index:
        dungeon.index,

      name:
        encounter.name,

      min:
        encounter.min,

      max:
        encounter.max,

      reward:
        encounter.reward,

      total,
      success,

      rolls:
        dungeon.lastRolls.map(
          roll => ({ ...roll })
        ),

      survivalResults:
        dungeon.survivalResults.map(
          result => ({ ...result })
        )
    };

    dungeon.phase = "resolved";

    save();
    render();
  }

  function confirmRolledResult() {
    if (
      state.dungeon?.phase ===
      "rolled"
    ) {
      resolveCurrentRolls();
    }
  }

  function useRope() {
    const dungeon = state.dungeon;

    if (
      !dungeon ||
      dungeon.phase !== "rolled" ||
      dungeon.carriedItem !== "rope" ||
      dungeon.itemUsed ||
      (state.inventory.rope || 0) <= 0
    ) {
      return;
    }

    state.inventory.rope -= 1;
    dungeon.itemUsed = true;
    dungeon.ropeRerolled = true;
    dungeon.lastRolls =
      rollPartyDice();

    addLog(
      "밧줄 1개를 사용해 파티 전체의 주사위를 다시 굴렸습니다."
    );

    resolveCurrentRolls();
  }

  function toggleBandageTargets() {
    const dungeon = state.dungeon;

    if (
      !dungeon ||
      dungeon.phase !== "ready" ||
      dungeon.carriedItem !==
        "bandage" ||
      dungeon.itemUsed ||
      (state.inventory.bandage || 0) <= 0
    ) {
      return;
    }

    dungeon.bandageTargetMode =
      !dungeon.bandageTargetMode;

    save();
    render();
  }

  function useBandage(characterId) {
    const dungeon = state.dungeon;

    const character =
      state.characters.find(
        entry =>
          entry.id === characterId
      );

    if (
      !dungeon ||
      dungeon.phase !== "ready" ||
      dungeon.carriedItem !==
        "bandage" ||
      dungeon.itemUsed ||
      (state.inventory.bandage || 0) <= 0 ||
      !character ||
      !character.alive ||
      !character.injured ||
      !state.partyIds.includes(
        character.id
      )
    ) {
      return;
    }

    state.inventory.bandage -= 1;
    dungeon.itemUsed = true;
    dungeon.bandageTargetMode =
      false;

    character.injured = false;

    addLog(
      `붕대 1개를 사용해 ${getCharacterName(character)}의 부상을 치료했습니다.`
    );

    save();
    render();
  }

  function advanceDungeon() {
    const dungeon = state.dungeon;

    if (
      !dungeon ||
      dungeon.phase !== "resolved"
    ) {
      return;
    }

    const noSurvivors =
      alivePartyMembers().length === 0;

    const isLast =
      dungeon.index >=
      dungeon.encounters.length - 1;

    if (noSurvivors || isLast) {
      finishDungeon(noSurvivors);
      return;
    }

    dungeon.index += 1;
    dungeon.phase = "ready";
    dungeon.lastRolls = [];
    dungeon.lastSuccess = null;
    dungeon.survivalResults = [];
    dungeon.bandageTargetMode =
      false;
    dungeon.traumaSkips = {};

    save();
    render();
  }

  function finishDungeon(
    partyWiped = false
  ) {
    const dungeon = state.dungeon;

    if (!dungeon) {
      return;
    }

    const startedMembers =
      dungeon.startedPartyIds
        .map(id =>
          state.characters.find(
            character =>
              character.id === id
          )
        )
        .filter(Boolean);

    const survivors =
      startedMembers.filter(
        character =>
          character.alive
      );

    const injuredIds =
      survivors
        .filter(
          character =>
            character.injured
        )
        .map(
          character =>
            character.id
        );

    const injuryMultiplier =
      Math.max(
        0.4,
        1 - injuredIds.length * 0.15
      );

    if (!partyWiped) {
      survivors.forEach(character => {
        character.successCount =
          (character.successCount || 0) +
          1;
      });
    }

    let lockpickUsed = false;
    let boostedGold =
      dungeon.earnedGold;

    if (
      !partyWiped &&
      dungeon.carriedItem ===
        "lockpick" &&
      !dungeon.itemUsed &&
      (state.inventory.lockpick || 0) >
        0
    ) {
      state.inventory.lockpick -= 1;
      lockpickUsed = true;

      boostedGold =
        Math.floor(
          dungeon.earnedGold * 1.5
        );
    }

    const finalGold =
      partyWiped
        ? 0
        : Math.floor(
            boostedGold *
              injuryMultiplier
          );

    state.gold += finalGold;

    const startingTraumaIds =
      new Set(
        dungeon.startingTraumaIds || []
      );

    const newTraumaIds =
      startedMembers
        .filter(
          character =>
            character.trauma &&
            !startingTraumaIds.has(
              character.id
            )
        )
        .map(
          character =>
            character.id
        );

    const snapshots =
      startedMembers.map(character =>
        characterSnapshot(
          character,
          injuredIds.includes(
            character.id
          )
        )
      );

    state.lastSummary = {
      difficulty:
        dungeon.difficulty || "easy",

      earnedGold:
        dungeon.earnedGold,

      boostedGold,
      lockpickUsed,

      injuredCount:
        injuredIds.length,

      multiplier:
        injuryMultiplier,

      finalGold,
      partyWiped,

      survivors:
        survivors.length,

      successAwarded:
        partyWiped
          ? 0
          : survivors.length,

      carriedItem:
        dungeon.carriedItem,

      memberSnapshots:
        snapshots,

      deadIds:
        startedMembers
          .filter(
            character =>
              !character.alive
          )
          .map(
            character =>
              character.id
          ),

      injuredIds,
      newTraumaIds,

      encounterReports:
        (dungeon.encounterReports || [])
          .filter(Boolean),

      completedAt:
        new Date().toISOString()
    };

    state.characters.forEach(
      character => {
        if (character.alive) {
          character.injured = false;
        }
      }
    );

    state.partyIds =
      state.partyIds.filter(id => {
        const character =
          state.characters.find(
            entry => entry.id === id
          );

        return (
          character &&
          character.alive
        );
      });

    if (
      dungeon.carriedItem &&
      (state.inventory[
        dungeon.carriedItem
      ] || 0) <= 0
    ) {
      state.selectedItem = null;
    }

    if (partyWiped) {
      addLog(
        `원정대 전멸. 누적 보상 ${dungeon.earnedGold}G를 회수하지 못했습니다.`
      );
    } else {
      addLog(
        `던전 정산 완료: ${
          lockpickUsed
            ? "락픽 +50%, "
            : ""
        }부상자 ${injuredIds.length}명, 부상 배율 ${Math.round(injuryMultiplier * 100)}%, 최종 ${finalGold}G 획득. 생환한 ${survivors.length}명의 모험 성공 횟수가 +1 되었습니다.`
      );
    }

    state.dungeon = null;
    state.currentScreen = "result";

    save();
    render();
  }

  function resetGame() {
    const accepted =
      window.confirm(
        "전체 게임 데이터를 초기화할까요?\n\n" +
        "골드, 모험가, 묘지, 아이템, 파티, 디버프, 성공 횟수와 기록이 모두 삭제됩니다."
      );

    if (!accepted) {
      return;
    }

    localStorage.removeItem(
      STORAGE_KEY
    );

    state = defaultState();

    addLog(
      `전체 게임 데이터를 초기화했습니다. 길드 자금 ${STARTING_GOLD}G로 새 게임을 시작합니다.`
    );

    save();
    render();
  }

  function normalizeState() {
    state.partyIds =
      state.partyIds
        .filter(id => {
          const character =
            state.characters.find(
              entry => entry.id === id
            );

          return (
            character &&
            character.alive
          );
        })
        .slice(0, 4);

    if (
      state.selectedItem &&
      (state.inventory[
        state.selectedItem
      ] || 0) <= 0 &&
      !state.dungeon
    ) {
      state.selectedItem = null;
    }

    if (state.dungeon) {
      state.currentScreen =
        "adventure";
    }

    if (
      state.currentScreen ===
        "result" &&
      !state.lastSummary
    ) {
      state.currentScreen = "home";
    }
  }

  function renderTopbar() {
    const alive =
      livingCharacters().length;

    const dead =
      deadCharacters().length;

    topGoldEl.textContent =
      `${state.gold.toLocaleString("ko-KR")} G`;

    topAliveEl.textContent =
      `${alive}명`;

    topDeadEl.textContent =
      `${dead}명`;

    document
      .querySelectorAll("[data-nav]")
      .forEach(button => {
        const nav =
          button.dataset.nav;

        button.classList.toggle(
          "active",
          state.currentScreen === nav
        );

        button.disabled =
          Boolean(state.dungeon);
      });
  }

  function renderStatusChips(
    character
  ) {
    const chips = [];

    if (character.trauma) {
      chips.push(
        '<span class="chip trauma">트라우마</span>'
      );
    }

    if (character.injured) {
      chips.push(
        '<span class="chip injury">부상 ±2</span>'
      );
    }

    if (!chips.length) {
      chips.push(
        '<span class="chip safe">정상</span>'
      );
    }

    return chips.join("");
  }

  function renderHome() {
    const alive =
      livingCharacters();

    const dead =
      deadCharacters();

    const traumaCount =
      alive.filter(
        character =>
          character.trauma
      ).length;

    const recent =
      state.log.slice(0, 7);

    const summary =
      state.lastSummary;

    const shopHtml =
      Object.entries(ITEM_DEFS)
        .map(([key, item]) => `
          <article class="shop-card">
            <div class="shop-head">
              <span class="shop-icon">
                ${item.icon}
              </span>

              <span class="shop-count">
                보유 ${state.inventory[key] || 0}
              </span>
            </div>

            <div class="shop-name">
              ${escapeHtml(item.name)}
            </div>

            <div class="shop-desc">
              ${escapeHtml(item.description)}
            </div>

            <button
              class="btn secondary small"
              data-action="buy-item"
              data-key="${key}"
              ${
                state.gold < item.price
                  ? "disabled"
                  : ""
              }
            >
              구매 ${item.price}G
            </button>
          </article>
        `)
        .join("");

    const summaryHtml =
      summary
        ? `
          <div class="last-result">
            <div class="result-emblem">
              ${
                summary.partyWiped
                  ? "☠️"
                  : "🏆"
              }
            </div>

            <div>
              <h3>
                ${escapeHtml(
                  (
                    DIFFICULTIES[
                      summary.difficulty
                    ] ||
                    DIFFICULTIES.easy
                  ).name
                )}
                던전
                ${
                  summary.partyWiped
                    ? "전멸"
                    : "완료"
                }
              </h3>

              <p>

  function renderAdventure() {
    const dungeon = state.dungeon;

    if (!dungeon) {
      state.currentScreen =
        state.lastSummary
          ? "result"
          : "home";

      save();
      render();
      return;
    }

    const encounter =
      dungeon.encounters[
        dungeon.index
      ];

    const difficulty =
      DIFFICULTIES[
        dungeon.difficulty
      ] || DIFFICULTIES.easy;

    const party =
      dungeon.startedPartyIds
        .map(id =>
          state.characters.find(
            character =>
              character.id === id
          )
        )
        .filter(Boolean);

    const total =
      dungeon.lastRolls.reduce(
        (sum, roll) =>
          sum + roll.final,
        0
      );

    const previewSuccess =
      total >= encounter.min &&
      total <= encounter.max;

    const noSurvivors =
      alivePartyMembers().length === 0;

    const isLast =
      dungeon.index >=
      dungeon.encounters.length - 1;

    const progressHtml =
      dungeon.encounters
        .map((entry, index) => {
          let className = "";

          if (
            index < dungeon.index ||
            (
              index === dungeon.index &&
              dungeon.phase === "resolved"
            )
          ) {
            className = "done";
          }

          if (
            index === dungeon.index &&
            ["ready", "rolled"]
              .includes(dungeon.phase)
          ) {
            className = "current";
          }

          return `
            <div class="progress-step ${className}">
              ${index + 1}차 ·
              ${escapeHtml(entry.name)}
            </div>
          `;
        })
        .join("");

    const rollHtml =
      dungeon.lastRolls.length
        ? `
          <div class="roll-grid">
            ${dungeon.lastRolls
              .map(roll => {
                const character =
                  state.characters.find(
                    entry =>
                      entry.id ===
                      roll.characterId
                  );

                const profile =
                  character
                    ? getCharacterProfile(
                        character
                      )
                    : {
                        job: {
                          icon: "🎲"
                        }
                      };

                const detail =
                  roll.skipped
                    ? "트라우마 발동 · 주사위 미사용"
                    : roll.modifier
                      ? `원본 ${roll.raw} · ${
                          roll.modifier > 0
                            ? "+2"
                            : "-2"
                        } 보정`
                      : "보정 없음";

                return `
                  <div class="roll-card">
                    <div>
                      <h3>
                        ${profile.job.icon}
                        ${escapeHtml(roll.name)}
                      </h3>

                      <p>${detail}</p>
                    </div>

                    <div
                      class="die-face ${
                        roll.skipped
                          ? "skipped"
                          : ""
                      }"
                    >
                      ${roll.final}
                    </div>
                  </div>
                `;
              })
              .join("")}
          </div>
        `
        : `
          <div class="empty-state">
            파티 주사위를 굴리면
            결과가 이곳에 표시됩니다.
          </div>
        `;

    const survivalHtml =
      dungeon.survivalResults.length
        ? `
          <div class="survival-list">
            ${dungeon.survivalResults
              .map(result => {
                const label =
                  result.result === "dead"
                    ? "사망"
                    : result.result === "trauma"
                      ? "트라우마"
                      : result.result === "injured"
                        ? "부상"
                        : "무사 생존";

                return `
                  <div class="survival-row">
                    <span>
                      ${escapeHtml(result.name)}
                      · 판정 ${result.roll}
                    </span>

                    <strong
                      class="status-${result.result}"
                    >
                      ${label}
                    </strong>
                  </div>
                `;
              })
              .join("")}
          </div>
        `
        : "";

    let resultHtml = "";

    if (dungeon.phase === "rolled") {
      resultHtml = `
        <div class="result-banner preview">
          임시 결과 · 합계 ${total} ·
          ${
            previewSuccess
              ? "현재 성공"
              : "현재 실패"
          }
          · 밧줄 사용 여부를 선택하세요.
        </div>
      `;
    } else if (
      dungeon.phase === "resolved"
    ) {
      resultHtml = `
        <div
          class="result-banner ${
            dungeon.lastSuccess
              ? "success"
              : "failure"
          }"
        >
          ${
            dungeon.lastSuccess
              ? `인카운터 성공 · 합계 ${total} · ${encounter.reward}G 확보`
              : `인카운터 실패 · 합계 ${total} · 생존 판정 발생`
          }
        </div>

        ${survivalHtml}
      `;
    }

    let actionsHtml = "";

    if (dungeon.phase === "ready") {
      actionsHtml = `
        <div class="adventure-actions single">
          <button
            class="btn primary wide"
            data-action="roll-encounter"
          >
            파티 주사위 굴리기
          </button>
        </div>
      `;
    } else if (
      dungeon.phase === "rolled"
    ) {
      actionsHtml = `
        <div class="adventure-actions">
          <button
            class="btn primary wide"
            data-action="use-rope"
          >
            🪢 밧줄 사용 · 전체 재굴림
          </button>

          <button
            class="btn secondary wide"
            data-action="confirm-roll"
          >
            현재 결과 확정
          </button>
        </div>
      `;
    } else {
      actionsHtml = `
        <div class="adventure-actions single">
          <button
            class="btn primary wide"
            data-action="advance-dungeon"
          >
            ${
              noSurvivors || isLast
                ? "모험 결과 확인"
                : "다음 인카운터로"
            }
          </button>
        </div>
      `;
    }

    const partyHtml =
      party
        .map(character => {
          const profile =
            getCharacterProfile(
              character
            );

          return `
            <div
              class="mini-character ${
                character.alive
                  ? ""
                  : "dead"
              }"
            >
              <div class="party-avatar">
                ${profile.job.icon}
              </div>

              <div>
                <h3>
                  ${escapeHtml(profile.name)}
                </h3>

                <p>
                  ${escapeHtml(profile.race.name)}
                  ${escapeHtml(profile.job.name)}
                  ·
                  ${escapeHtml(profile.personality.name)}
                </p>
              </div>

              <div
                class="chip-row"
                style="justify-content:flex-end;margin:0"
              >
                ${
                  character.alive
                    ? renderStatusChips(character)
                    : '<span class="chip injury">사망</span>'
                }
              </div>
            </div>
          `;
        })
        .join("");

    const item =
      dungeon.carriedItem
        ? ITEM_DEFS[
            dungeon.carriedItem
          ]
        : null;

    const injured =
      alivePartyMembers()
        .filter(
          character =>
            character.injured
        );

    const bandageTargets =
      dungeon.bandageTargetMode &&
      injured.length
        ? `
          <div class="bandage-targets">
            ${injured
              .map(character => {
                const profile =
                  getCharacterProfile(
                    character
                  );

                return `
                  <button
                    class="btn secondary small"
                    data-action="use-bandage"
                    data-id="${character.id}"
                  >
                    ${profile.job.icon}
                    ${escapeHtml(profile.name)}
                    치료
                  </button>
                `;
              })
              .join("")}
          </div>
        `
        : "";

    let toolAction = "";

    if (
      item &&
      dungeon.carriedItem === "bandage" &&
      dungeon.phase === "ready" &&
      !dungeon.itemUsed
    ) {
      toolAction = `
        <button
          class="btn secondary small"
          data-action="toggle-bandage"
          ${
            injured.length &&
            (state.inventory.bandage || 0) > 0
              ? ""
              : "disabled"
          }
        >
          붕대 사용
        </button>
      `;
    }

    screenEl.innerHTML = `
      <div class="page-grid adventure-grid">
        <section class="panel encounter-panel">
          <div class="progress-track">
            ${progressHtml}
          </div>

          <div class="encounter-header">
            <div>
              <div class="encounter-kicker">
                ENCOUNTER
                ${dungeon.index + 1} / 3
              </div>

              <h2>
                ${escapeHtml(encounter.name)}
              </h2>
            </div>

            <span class="difficulty-badge">
              ${escapeHtml(difficulty.name)}
            </span>
          </div>

          <div class="condition-row">
            <div class="condition-box target">
              <span>성공 범위</span>
              <strong>
                ${encounter.min}
                ~
                ${encounter.max}
              </strong>
            </div>

            <div class="condition-box">
              <span>성공 보상</span>
              <strong>
                ${encounter.reward}G
              </strong>
            </div>

            <div class="condition-box">
              <span>누적 보상</span>
              <strong>
                ${dungeon.earnedGold}G
              </strong>
            </div>
          </div>

          <div class="encounter-stage">
            ${rollHtml}
            ${resultHtml}
          </div>

          ${actionsHtml}
        </section>

        <div class="column-stack adventure-right">
          <section class="panel">
            <div class="panel-header">
              <div>
                <h2 class="panel-title">
                  원정 파티
                </h2>

                <p class="panel-subtitle">
                  현재 생존
                  ${alivePartyMembers().length}명
                </p>
              </div>
            </div>

            <div class="party-mini-list">
              ${partyHtml}
            </div>
          </section>

          <section class="panel scroll">
            <div class="tool-panel">
              <div class="line-between">
                <h3>
                  ${
                    item
                      ? `${item.icon} ${escapeHtml(item.name)}`
                      : "원정 도구 없음"
                  }
                </h3>

                <span class="badge">
                  ${
                    item
                      ? dungeon.itemUsed
                        ? "사용 완료"
                        : dungeon.carriedItem === "lockpick"
                          ? "완료 시 발동"
                          : "사용 가능"
                      : "없음"
                  }
                </span>
              </div>

              <p>
                ${
                  item
                    ? escapeHtml(item.description)
                    : "이번 원정에는 도구를 가져오지 않았습니다."
                }
              </p>

              ${
                toolAction
                  ? `<div style="height:8px"></div>${toolAction}`
                  : ""
              }

              ${bandageTargets}
            </div>

            <div style="height:10px"></div>

            <div class="tool-panel">
              <h3>판정 규칙</h3>

              <p>
                주사위 합이 성공 범위 안이면 성공합니다.
                실패 시 생존 판정 1은 사망,
                2는 트라우마, 3은 부상입니다.
              </p>
            </div>
          </section>

          <section class="panel">
            <div class="prep-summary">
              <div>
                <span>진행</span>
                <strong>
                  ${dungeon.index + 1}/3
                </strong>
              </div>

              <div>
                <span>난이도</span>
                <strong>
                  ${escapeHtml(difficulty.name)}
                </strong>
              </div>

              <div>
                <span>아이템</span>
                <strong>
                  ${
                    dungeon.itemUsed
                      ? "사용됨"
                      : "미사용"
                  }
                </strong>
              </div>
            </div>
          </section>
        </div>
      </div>
    `;
  }

  function renderResult() {
    const summary =
      state.lastSummary;

    if (!summary) {
      state.currentScreen = "home";
      save();
      render();
      return;
    }

    const difficulty =
      DIFFICULTIES[
        summary.difficulty
      ] || DIFFICULTIES.easy;

    const snapshots =
      Array.isArray(
        summary.memberSnapshots
      )
        ? summary.memberSnapshots
        : [];

    const deadIds =
      new Set(summary.deadIds || []);

    const injuredIds =
      new Set(summary.injuredIds || []);

    const newTraumaIds =
      new Set(
        summary.newTraumaIds || []
      );

    const reports =
      Array.isArray(
        summary.encounterReports
      )
        ? summary.encounterReports
        : [];

    const outcomeHtml =
      snapshots.length
        ? snapshots
            .map(member => {
              const tags = [];

              if (
                deadIds.has(member.id) ||
                !member.alive
              ) {
                tags.push(
                  '<span class="chip injury">사망</span>'
                );
              } else {
                tags.push(
                  '<span class="chip safe">생환</span>'
                );
              }

              if (
                newTraumaIds.has(
                  member.id
                )
              ) {
                tags.push(
                  '<span class="chip trauma">신규 트라우마</span>'
                );
              } else if (member.trauma) {
                tags.push(
                  '<span class="chip trauma">트라우마</span>'
                );
              }

              if (
                injuredIds.has(member.id)
              ) {
                tags.push(
                  '<span class="chip injury">부상 후 회복</span>'
                );
              }

              return `
                <div class="outcome-card">
                  <div class="card-top">
                    <div class="party-avatar">
                      ${member.icon || "🧭"}
                    </div>

                    <div
                      class="chip-row"
                      style="margin:0;justify-content:flex-end"
                    >
                      ${tags.join("")}
                    </div>
                  </div>

                  <h3>
                    ${escapeHtml(member.name)}
                  </h3>

                  <p>
                    ${escapeHtml(member.gender)}
                    ·
                    ${escapeHtml(member.race)}
                    ·
                    ${escapeHtml(member.job)}
                  </p>

                  <p>
                    성격
                    ${escapeHtml(member.personality)}
                    · 모험 성공
                    ${member.successCount || 0}회
                  </p>
                </div>
              `;
            })
            .join("")
        : `
          <div
            class="empty-state"
            style="grid-column:1/-1"
          >
            이전 버전에서 완료된 원정이라
            상세 파티 기록이 없습니다.
          </div>
        `;

    const reportHtml =
      reports.length
        ? reports
            .map((report, index) => `
              <div class="report-row">
                <div class="report-index">
                  ${index + 1}
                </div>

                <div>
                  <h3>
                    ${escapeHtml(report.name)}
                  </h3>

                  <p>
                    합계 ${report.total}
                    · 성공 범위
                    ${report.min}~${report.max}
                    ${
                      report.success
                        ? ` · ${report.reward}G 획득`
                        : " · 생존 판정"
                    }
                  </p>
                </div>

                <div
                  class="report-result ${
                    report.success
                      ? "success"
                      : "failure"
                  }"
                >
                  ${
                    report.success
                      ? "성공"
                      : "실패"
                  }
                </div>
              </div>
            `)
            .join("")
        : `
          <div class="empty-state">
            상세 인카운터 기록이 없습니다.
          </div>
        `;

    screenEl.innerHTML = `
      <div class="page-grid result-grid">
        <div class="column-stack result-left">
          <section
            class="result-hero ${
              summary.partyWiped
                ? "failure"
                : "success"
            }"
          >
            <div class="big-icon">
              ${
                summary.partyWiped
                  ? "☠️"
                  : "🏆"
              }
            </div>

            <h2>
              ${escapeHtml(difficulty.name)}
              던전
              ${
                summary.partyWiped
                  ? "원정대 전멸"
                  : "탐험 완료"
              }
            </h2>

            <p>
              ${
                summary.partyWiped
                  ? "누적한 골드를 회수하지 못했습니다."
                  : `생환한 ${summary.survivors ?? 0}명의 모험 성공 횟수가 1회 증가했습니다.`
              }
            </p>

            <div style="height:14px"></div>

            <div class="summary-grid">
              <div class="summary-card">
                <span>인카운터 누적</span>
                <strong>
                  ${summary.earnedGold || 0}G
                </strong>
              </div>

              <div class="summary-card">
                <span>락픽 적용 후</span>
                <strong>
                  ${
                    summary.lockpickUsed
                      ? `${summary.boostedGold || 0}G`
                      : "미사용"
                  }
                </strong>
              </div>

              <div class="summary-card">
                <span>부상 배율</span>
                <strong>
                  ${
                    summary.partyWiped
                      ? "0%"
                      : `${Math.round((summary.multiplier || 0) * 100)}%`
                  }
                </strong>
              </div>

              <div class="summary-card">
                <span>부상자</span>
                <strong>
                  ${summary.injuredCount || 0}명
                </strong>
              </div>

              <div class="summary-card">
                <span>생환자</span>
                <strong>
                  ${summary.survivors || 0}명
                </strong>
              </div>

              <div class="summary-card">
                <span>최종 보상</span>
                <strong>
                  ${summary.finalGold || 0}G
                </strong>
              </div>
            </div>
          </section>

          <section class="panel scroll">
            <div class="panel-header">
              <div>
                <h2 class="panel-title">
                  파티 결과
                </h2>

                <p class="panel-subtitle">
                  부상은 정산 후 회복되며
                  트라우마는 유지됩니다.
                </p>
              </div>
            </div>

            <div class="outcome-grid">
              ${outcomeHtml}
            </div>
          </section>

          <section class="panel">
            <div class="button-row">
              <button
                class="btn primary"
                data-action="result-home"
              >
                길드 홀로 돌아가기
              </button>

              <button
                class="btn blue"
                data-action="result-party"
              >
                다음 파티 준비
              </button>
            </div>
          </section>
        </div>

        <section class="panel scroll">
          <div class="panel-header">
            <div>
              <h2 class="panel-title">
                인카운터 보고서
              </h2>

              <p class="panel-subtitle">
                각 판정의 합계와 성공 여부입니다.
              </p>
            </div>
          </div>

          <div class="report-list">
            ${reportHtml}
          </div>

          <div style="height:14px"></div>

          <div class="tool-panel">
            <h3>정산 규칙</h3>

            <p>
              락픽 보너스가 있다면 누적 보상에
              먼저 +50%가 적용되고,
              이후 생존 부상자 1명당
              보상이 15% 감소합니다.
              최소 배율은 40%입니다.
            </p>
          </div>
        </section>
      </div>
    `;
  }

  function render() {
    normalizeState();
    renderTopbar();

    if (
      state.currentScreen === "party"
    ) {
      renderParty();
    } else if (
      state.currentScreen ===
      "adventure"
    ) {
      renderAdventure();
    } else if (
      state.currentScreen ===
      "result"
    ) {
      renderResult();
    } else {
      renderHome();
    }
  }

  document.addEventListener(
    "click",
    event => {
      const navButton =
        event.target.closest(
          "[data-nav]"
        );

      if (navButton) {
        setScreen(
          navButton.dataset.nav
        );

        return;
      }

      const target =
        event.target.closest(
          "[data-action]"
        );

      if (!target) {
        return;
      }

      const action =
        target.dataset.action;

      if (action === "draw") {
        drawCharacters(
          Number(target.dataset.count) || 1
        );
      } else if (
        action === "buy-item"
      ) {
        buyItem(target.dataset.key);
      } else if (
        action === "go-party"
      ) {
        setScreen("party");
      } else if (
        action === "view-result"
      ) {
        setScreen("result");
      } else if (
        action === "reset-game"
      ) {
        resetGame();
      } else if (
        action === "toggle-party"
      ) {
        toggleParty(target.dataset.id);
      } else if (
        action === "auto-party"
      ) {
        autoParty();
      } else if (
        action === "clear-party"
      ) {
        clearParty();
      } else if (
        action === "difficulty"
      ) {
        selectDifficulty(
          target.dataset.key
        );
      } else if (
        action === "select-item"
      ) {
        selectItem(target.dataset.key);
      } else if (
        action === "start-dungeon"
      ) {
        startDungeon();
      } else if (
        action === "roll-encounter"
      ) {
        rollEncounter();
      } else if (
        action === "use-rope"
      ) {
        useRope();
      } else if (
        action === "confirm-roll"
      ) {
        confirmRolledResult();
      } else if (
        action === "advance-dungeon"
      ) {
        advanceDungeon();
      } else if (
        action === "toggle-bandage"
      ) {
        toggleBandageTargets();
      } else if (
        action === "use-bandage"
      ) {
        useBandage(target.dataset.id);
      } else if (
        action === "result-home"
      ) {
        setScreen("home");
      } else if (
        action === "result-party"
      ) {
        setScreen("party");
      }
    }
  );

  document.addEventListener(
    "keydown",
    event => {
      if (
        (
          event.key === "Enter" ||
          event.key === " "
        ) &&
        event.target.matches(
          '[data-action="toggle-party"]'
        )
      ) {
        event.preventDefault();

        toggleParty(
          event.target.dataset.id
        );
      }
    }
  );

  save();
  render();
})();
</script>
</body>
</html>
